<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Pedido • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0b0b; color: #eee; margin:0; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .gold-bg { background: #caa85c; }
        .card { background: #141414; border-radius: 18px; border: 1px solid #2a2a2a; padding: 20px; margin-bottom: 20px; }
        input, select { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; padding: 12px !important; border-radius: 10px !important; width: 100%; margin-bottom: 10px; font-size: 13px; }
        .btn-pay { border: 1px solid #333; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; grayscale: 1; opacity: 0.5; }
        .btn-pay.active { border-color: #caa85c; background: #caa85c22; grayscale: 0; opacity: 1; }
    </style>
</head>
<body class="p-4 pb-24">

<header class="flex justify-between items-center mb-6">
    <a href="produtos.html" class="text-gray-400 text-sm">← Voltar</a>
    <h1 class="serif gold-text text-lg uppercase tracking-widest">Carrinho</h1>
    <div class="w-8"></div>
</header>

<div id="listaItens" class="mb-6">
    </div>

<div class="card">
    <h2 class="text-xs font-bold uppercase gold-text mb-4 tracking-widest">Seus Dados</h2>
    <input type="text" id="nomeCliente" placeholder="Seu nome completo">
    <input type="tel" id="telefoneCliente" placeholder="Seu WhatsApp (com DDD)">
    
    <h2 class="text-xs font-bold uppercase gold-text my-4 tracking-widest">Endereço de Entrega</h2>
    <input type="text" id="nomeEntrega" placeholder="Quem recebe?">
    <input type="text" id="rua" placeholder="Rua e Número">
    <input type="text" id="bairro" placeholder="Bairro">
    <input type="text" id="cidade" placeholder="Cidade / Estado">
</div>

<div class="card">
    <h2 class="text-xs font-bold uppercase gold-text mb-4 tracking-widest">Pagamento</h2>
    <div class="grid grid-cols-2 gap-3">
        <div onclick="setPagamento('pix')" id="pay-pix" class="btn-pay">
            <span class="block text-xs font-bold uppercase">PIX</span>
            <span class="text-[9px] text-green-500 font-bold" id="descPixTxt">0% OFF</span>
        </div>
        <div onclick="setPagamento('cartao')" id="pay-cartao" class="btn-pay">
            <span class="block text-xs font-bold uppercase">Cartão</span>
            <span class="text-[9px]">Link de Pagamento</span>
        </div>
    </div>
</div>

<div class="card border-[#caa85c]">
    <h2 class="text-xs font-bold uppercase gold-text mb-4 tracking-widest">Resumo do Pedido</h2>
    <div class="space-y-2 text-sm">
        <div class="flex justify-between text-gray-400">
            <span>Subtotal</span>
            <span id="subtotalTxt">R$ 0,00</span>
        </div>
        
        <div id="linhaDescontoPromo" class="flex justify-between text-green-500 hidden">
            <span id="labelPromo">Desconto Atacado</span>
            <span id="valorPromo">- R$ 0,00</span>
        </div>

        <div id="linhaDescontoPix" class="flex justify-between text-green-500 hidden">
            <span>Desconto PIX</span>
            <span id="valorDescPix">- R$ 0,00</span>
        </div>

        <div class="flex justify-between text-lg font-bold border-t border-[#333] pt-2 mt-2">
            <span>Total</span>
            <span class="gold-text" id="totalTxt">R$ 0,00</span>
        </div>
    </div>
</div>

<button onclick="finalizarPedido()" class="fixed bottom-4 left-4 right-4 gold-bg text-black font-bold py-4 rounded-2xl shadow-2xl uppercase text-xs tracking-widest z-50">
    Finalizar Pedido via WhatsApp
</button>

<script>
// CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyB...",
    authDomain: "loja-joias-62725.firebaseapp.com",
    databaseURL: "https://loja-joias-62725-default-rtdb.firebaseio.com",
    projectId: "loja-joias-62725",
    storageBucket: "loja-joias-62725.appspot.com",
    messagingSenderId: "360060012543",
    appId: "1:360060012543:web:757367c06eb7042858b456"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
let pagamento = '';
let configEmpresa = {};
let promoAtacado = null;

const fM = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

window.onload = async () => {
    // 1. Carrega Configurações da Loja
    const snapGeral = await db.ref('settings/general').once('value');
    configEmpresa = snapGeral.val() || {};
    document.getElementById('descPixTxt').innerText = `${configEmpresa.descontoPix || 0}% OFF`;

    // 2. Carrega Regras de Atacado
    const snapPromo = await db.ref('settings/promocoesValor').once('value');
    promoAtacado = snapPromo.val();

    renderItens();
    calcularTotais();
};

function renderItens() {
    const list = document.getElementById('listaItens');
    if (carrinho.length === 0) {
        list.innerHTML = `<div class="text-center py-10 text-gray-500">Seu carrinho está vazio</div>`;
        return;
    }
    
    list.innerHTML = carrinho.map((item, index) => `
        <div class="card flex items-center gap-4 p-3 mb-3">
            <img src="${item.image}" class="w-16 h-16 object-cover rounded-lg">
            <div class="flex-1">
                <h4 class="text-[11px] font-bold uppercase">${item.name}</h4>
                <p class="gold-text text-sm font-bold">${fM(item.price)}</p>
                <div class="flex items-center gap-3 mt-2">
                    <button onclick="updateQtd(${index}, -1)" class="w-6 h-6 bg-[#222] rounded-full">-</button>
                    <span class="text-xs font-bold">${item.qnt}</span>
                    <button onclick="updateQtd(${index}, 1)" class="w-6 h-6 bg-[#222] rounded-full">+</button>
                </div>
            </div>
            <button onclick="removerItem(${index})" class="text-red-900">×</button>
        </div>
    `).join('');
}

function updateQtd(index, v) {
    carrinho[index].qnt = Math.max(1, carrinho[index].qnt + v);
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    renderItens();
    calcularTotais();
}

function removerItem(index) {
    carrinho.splice(index, 1);
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    renderItens();
    calcularTotais();
}

function setPagamento(tipo) {
    pagamento = tipo;
    document.querySelectorAll('.btn-pay').forEach(b => b.classList.remove('active'));
    document.getElementById(`pay-${tipo}`).classList.add('active');
    calcularTotais();
}

async function calcularTotais() {
    let bruto = carrinho.reduce((acc, i) => acc + (i.price * i.qnt), 0);
    let descontoAtacadoPerc = 0;
    let valorDescontoAtacado = 0;

    // LÓGICA DE ATACADO (CIRÚRGICA)
    if (promoAtacado && promoAtacado.ativa && promoAtacado.regras) {
        // Encontra a regra de maior valor que o subtotal atual atinge
        let regraAlcancada = [...promoAtacado.regras].reverse().find(r => bruto >= r.min);
        if (regraAlcancada) {
            descontoAtacadoPerc = regraAlcancada.desc;
            valorDescontoAtacado = bruto * (descontoAtacadoPerc / 100);
        }
    }

    const subtotalAposAtacado = bruto - valorDescontoAtacado;

    // LÓGICA DE PIX
    let valorDescPix = 0;
    if (pagamento === 'pix' && configEmpresa.descontoPix > 0) {
        valorDescPix = subtotalAposAtacado * (configEmpresa.descontoPix / 100);
    }

    let totalFinal = subtotalAposAtacado - valorDescPix;

    // UI - Atualizar Resumo
    document.getElementById('subtotalTxt').innerText = fM(bruto);
    
    const divPromo = document.getElementById('linhaDescontoPromo');
    if (descontoAtacadoPerc > 0) {
        divPromo.classList.remove('hidden');
        document.getElementById('labelPromo').innerText = `Desconto Atacado (${descontoAtacadoPerc}%)`;
        document.getElementById('valorPromo').innerText = `- ${fM(valorDescontoAtacado)}`;
    } else {
        divPromo.classList.add('hidden');
    }

    const divPix = document.getElementById('linhaDescontoPix');
    if (valorDescPix > 0) {
        divPix.classList.remove('hidden');
        document.getElementById('valorDescPix').innerText = `- ${fM(valorDescPix)}`;
    } else {
        divPix.classList.add('hidden');
    }

    document.getElementById('totalTxt').innerText = fM(totalFinal);
    
    // Guardar resumo para o envio do pedido
    window.resumoFinal = { bruto, totalFinal, descontoAtacadoPerc, valorDescPix };
}

async function finalizarPedido() {
    const nome = document.getElementById('nomeCliente').value;
    const whats = document.getElementById('telefoneCliente').value;
    if (!nome || !whats || !pagamento) return alert("Por favor, preencha seus dados e escolha o pagamento.");
    if (carrinho.length === 0) return alert("Carrinho vazio.");

    const pedido = {
        cliente: { nome, whatsapp: whats },
        entrega: {
            nome: document.getElementById('nomeEntrega').value,
            rua: document.getElementById('rua').value,
            bairro: document.getElementById('bairro').value,
            cidade: document.getElementById('cidade').value
        },
        pagamento,
        itens: carrinho,
        resumo: window.resumoFinal,
        data: new Date().toLocaleString('pt-BR'),
        status: "Novo"
    };

    try {
        await db.ref('orders').push(pedido);
        
        // Montar mensagem para o WhatsApp
        let msg = `*NOVO PEDIDO - ABELLA JOIAS*\n\n`;
        msg += `*Cliente:* ${nome}\n`;
        msg += `*WhatsApp:* ${whats}\n\n`;
        msg += `*ITENS:*\n`;
        carrinho.forEach(i => msg += `- ${i.qnt}x ${i.name} (${fM(i.price)})\n`);
        
        msg += `\n*RESUMO:*`;
        msg += `\nSubtotal: ${fM(window.resumoFinal.bruto)}`;
        if(window.resumoFinal.descontoAtacadoPerc > 0) msg += `\nDesconto Atacado: ${window.resumoFinal.descontoAtacadoPerc}%`;
        msg += `\n*TOTAL FINAL: ${fM(window.resumoFinal.totalFinal)}*`;
        msg += `\n\n*Pagamento:* ${pagamento.toUpperCase()}`;
        
        localStorage.removeItem('carrinho');
        const foneLoja = configEmpresa.whatsapp || '55XXXXXXXXXXX';
        window.location.href = `https://api.whatsapp.com/send?phone=${foneLoja}&text=${encodeURIComponent(msg)}`;
    } catch (e) {
        alert("Erro ao salvar pedido.");
    }
}
</script>
</body>
</html>
