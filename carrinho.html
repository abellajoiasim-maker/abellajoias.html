<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Pedido • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0b0b; color: #eee; margin:0; }
        .gold-text { color: #caa85c; }
        .gold-bg { background: #caa85c; }
        .card { background: #141414; border-radius: 18px; border: 1px solid #2a2a2a; padding: 20px; margin-bottom: 20px; }
        input { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; padding: 12px; border-radius: 10px; width: 100%; outline: none; margin-bottom: 12px; }
        .pay-btn { border: 1px solid #333; border-radius: 14px; padding: 16px; text-align: center; cursor: pointer; transition: 0.3s; }
        .pay-btn.active { border-color: #caa85c; background: rgba(202, 168, 92, 0.05); }
        .progress-fill { background: #caa85c; height: 100%; transition: width 0.6s ease; width: 0%; }
    </style>
</head>
<body>

<header class="sticky top-0 z-50 bg-black/95 p-4 border-b border-[#222] flex justify-between items-center">
    <button onclick="history.back()" class="text-[10px] font-bold gold-text uppercase">← Voltar</button>
    <h1 class="text-sm font-bold gold-text uppercase">Meu Carrinho</h1>
</header>

<main class="max-w-xl mx-auto p-4 pb-40">
    <div class="card border-dashed border-[#caa85c]">
        <div class="flex justify-between mb-2">
            <span id="labelProgresso" class="text-[10px] font-bold gold-text uppercase">Progresso</span>
            <span id="pctAtual" class="text-xs font-bold">0%</span>
        </div>
        <div class="w-full bg-[#222] h-2 rounded-full overflow-hidden">
            <div id="barraProgresso" class="progress-fill"></div>
        </div>
    </div>

    <div id="listaItens" class="space-y-4 mb-6"></div>

    <div class="card">
        <h2 class="text-center gold-text font-bold text-xs uppercase mb-4">Resumo Financeiro</h2>
        <div class="space-y-2 text-sm">
            <div class="flex justify-between"><span>Subtotal:</span> <span id="subtotalTxt">R$ 0,00</span></div>
            <div id="linhaAtacado" class="flex justify-between text-emerald-500 hidden"><span>Desconto Atacado:</span> <span id="valorAtacado">- R$ 0,00</span></div>
            <div class="flex justify-between border-t border-gray-800 pt-2 text-lg font-bold gold-text">
                <span>Total:</span> <span id="totalFinalTxt">R$ 0,00</span>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 class="text-[10px] gold-text font-bold uppercase mb-4 text-center">Pagamento</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="pay-btn" onclick="setPagamento('Pix', this)"><b>PIX</b><br><span class="text-[9px] text-emerald-500">BÔNUS EXTRA</span></div>
            <div class="pay-btn" onclick="setPagamento('Cartão', this)"><b>CARTÃO</b><br><span class="text-[9px] text-gray-500">SEM JUROS</span></div>
        </div>
    </div>

    <div class="card">
        <input id="nomeCliente" placeholder="Seu Nome Completo">
        <button onclick="finalizarPedido()" class="w-full gold-bg text-black py-5 rounded-2xl font-bold uppercase shadow-lg">Finalizar no WhatsApp</button>
    </div>
</main>

<script>
const firebaseConfig = { apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY", databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
let pagamento = '';
let configEmpresa = { whats: '' };

const fM = v => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

function setPagamento(p, el) {
    pagamento = p;
    document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
}

async function render() {
    const box = document.getElementById('listaItens');
    box.innerHTML = '';
    let bruto = 0;

    carrinho.forEach((item, index) => {
        let p = parseFloat(item.precoFinal || item.price);
        bruto += (p * item.quantidade);
        box.innerHTML += `
            <div class="flex items-center gap-4 bg-[#141414] p-3 rounded-xl border border-[#222]">
                <img src="${item.image}" class="w-14 h-14 object-cover rounded-lg">
                <div class="flex-1">
                    <h4 class="text-[10px] font-bold uppercase">${item.name}</h4>
                    <div class="flex items-center gap-2 mt-2">
                        <button onclick="alterarQtd(${index},-1)" class="w-6 h-6 bg-[#222] border border-[#333] rounded">-</button>
                        <span class="text-xs font-bold">${item.quantidade}</span>
                        <button onclick="alterarQtd(${index},1)" class="w-6 h-6 bg-[#222] border border-[#333] rounded">+</button>
                    </div>
                </div>
                <div class="text-right font-bold text-sm">${fM(p * item.quantidade)}</div>
            </div>`;
    });

    const snap = await db.ref('settings/promocaoValor').once('value');
    let economia = 0;
    if(snap.exists()){
        const regras = Object.values(snap.val()).sort((a,b) => a.minimo - b.minimo);
        let regraAtiva = [...regras].reverse().find(r => bruto >= r.minimo);
        let proxima = regras.find(r => bruto < r.minimo);
        
        if(regraAtiva) {
            economia = bruto * (regraAtiva.porcentagem / 100);
            document.getElementById('linhaAtacado').classList.remove('hidden');
            document.getElementById('valorAtacado').innerText = "- " + fM(economia);
        }

        if(proxima){
            let falta = proxima.minimo - bruto;
            document.getElementById('labelProgresso').innerText = `Faltam ${fM(falta)} para ${proxima.porcentagem}% OFF`;
            document.getElementById('barraProgresso').style.width = (bruto / proxima.minimo * 100) + "%";
            document.getElementById('pctAtual').innerText = (regraAtiva ? regraAtiva.porcentagem : 0) + "%";
        } else {
            document.getElementById('barraProgresso').style.width = "100%";
            document.getElementById('labelProgresso').innerText = "Vantagem Máxima!";
            document.getElementById('pctAtual').innerText = "100%";
        }
    }

    document.getElementById('subtotalTxt').innerText = fM(bruto);
    document.getElementById('totalFinalTxt').innerText = fM(bruto - economia);
    window.finalVal = bruto - economia;
}

function alterarQtd(idx, d) {
    carrinho[idx].quantidade += d;
    if(carrinho[idx].quantidade <= 0) carrinho.splice(idx, 1);
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    render();
}

async function finalizarPedido() {
    const nome = document.getElementById('nomeCliente').value;
    if(!nome || !pagamento) return alert("Preencha nome e pagamento.");
    const snap = await db.ref('settings/empresa').once('value');
    const fone = snap.val().whats;
    let msg = `Olá! Pedido de *${nome}*.\nTotal: ${fM(window.finalVal)}\nPagamento: ${pagamento}`;
    localStorage.removeItem('carrinho'); // LIMPA CARRINHO APÓS SUCESSO
    window.location.href = `https://api.whatsapp.com/send?phone=${fone}&text=${encodeURIComponent(msg)}`;
}

window.onload = render;
</script>
</body>
</html>
