<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Pedido • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0b0b; color: #eee; margin:0; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .gold-bg { background: #caa85c; }
        .card { background: #141414; border-radius: 18px; border: 1px solid #2a2a2a; padding: 20px; margin-bottom: 20px; }
        input { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; padding: 12px; border-radius: 10px; width: 100%; outline: none; margin-bottom: 12px; font-size: 14px; }
        .pay-btn { border: 1px solid #333; border-radius: 14px; padding: 16px; text-align: center; cursor: pointer; transition: 0.3s; }
        .pay-btn.active { border-color: #caa85c; background: rgba(202, 168, 92, 0.05); }
        
        #barraAtacado { background: #111; border: 1px solid #caa85c33; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .progress-bg { background: #222; height: 8px; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { background: #caa85c; height: 100%; width: 0%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px #caa85c; }
    </style>
</head>
<body>

<header class="sticky top-0 z-50 bg-black/95 backdrop-blur-md border-b border-[#222]">
    <div class="max-w-xl mx-auto p-4 flex justify-between items-center">
        <button onclick="history.back()" class="text-[10px] font-bold uppercase gold-text">← Voltar</button>
        <h1 class="serif gold-text uppercase text-sm tracking-widest">Finalizar Pedido</h1>
    </div>
</header>

<main class="max-w-xl mx-auto p-4 pb-40">
    
    <div id="barraAtacado" class="hidden">
        <div class="flex justify-between items-center text-[10px] font-bold uppercase">
            <span id="txtProgresso" class="text-gray-400">Progresso Atacado</span>
            <span id="percAtual" class="gold-text">0% OFF</span>
        </div>
        <div class="progress-bg"><div id="fillAtacado" class="progress-fill"></div></div>
        <p id="msgProximaFaixa" class="text-[9px] text-center text-gray-500 italic mt-1"></p>
    </div>

    <div class="card">
        <h2 class="serif gold-text uppercase text-[10px] mb-4 tracking-widest text-center opacity-70">Revisão do Pedido</h2>
        <div id="listaItens" class="space-y-4"></div>

        <div class="grid grid-cols-3 gap-2 mt-6 pt-6 border-t border-[#222]">
            <div class="bg-black p-3 rounded-xl border border-[#222] text-center">
                <span class="block text-[8px] uppercase text-gray-500 mb-1">Modelos</span>
                <b id="totalSkus" class="text-white text-xs">0</b>
            </div>
            <div class="bg-black p-3 rounded-xl border border-[#222] text-center">
                <span class="block text-[8px] uppercase text-gray-500 mb-1">Peças</span>
                <b id="totalPecas" class="text-white text-xs">0</b>
            </div>
            <div class="bg-black p-3 rounded-xl border border-[#caa85c]/20 text-center">
                <span class="block text-[8px] uppercase gold-text mb-1">Peso Total</span>
                <b id="pesoTotal" class="text-white text-xs">0,00g</b>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 class="serif gold-text uppercase text-[10px] mb-4 tracking-widest border-b border-[#222] pb-2">Identificação</h2>
        <input id="nomeCliente" placeholder="Nome Completo *">
        <input id="telefoneCliente" placeholder="WhatsApp *">
    </div>

    <div class="card">
        <h2 class="serif gold-text uppercase text-[10px] mb-4 tracking-widest border-b border-[#222] pb-2">Endereço</h2>
        <input id="nomeEntrega" placeholder="Destinatário">
        <input id="rua" placeholder="Rua e Número">
        <input id="bairro" placeholder="Bairro">
        <input id="cidade" placeholder="Cidade">
    </div>

    <div class="card">
        <h2 class="serif gold-text uppercase text-[10px] mb-4 tracking-widest border-b border-[#222] pb-2">Pagamento</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="pay-btn" id="btnPix" onclick="setPagamento('Pix')">
                <span class="block text-white font-bold">PIX</span>
                <span id="labelTxtPix" class="text-[10px] text-green-500 font-bold uppercase">--</span>
            </div>
            <div class="pay-btn" id="btnCartao" onclick="setPagamento('Cartão')">
                <span class="block text-white font-bold">CARTÃO</span>
                <span id="labelTxtCartao" class="text-[10px] text-blue-400 font-bold uppercase">--</span>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 class="serif gold-text uppercase text-[10px] mb-6 tracking-widest text-center border-b border-[#222] pb-2">Resumo</h2>
        <div class="space-y-3">
            <div class="flex justify-between text-gray-500 text-sm">
                <span>Subtotal Bruto</span>
                <b id="subtotalTxt" class="text-white">R$ 0,00</b>
            </div>
            
            <div id="linhaDescontoPromo" class="flex justify-between text-emerald-500 italic text-sm hidden">
                <span id="labelPromo">Atacado</span>
                <b id="valorDescontoPromo">- R$ 0,00</b>
            </div>

            <div id="linhaDescontoPix" class="flex justify-between text-blue-400 italic text-sm hidden">
                <span>Desconto Pix</span>
                <b id="valorDescontoPix">- R$ 0,00</b>
            </div>

            <div class="mt-4 pt-4 border-t-2 border-[#caa85c] flex justify-between items-center">
                <span class="serif gold-text text-xs uppercase tracking-tighter">Total a Pagar</span>
                <div id="totalTxt" class="text-3xl font-bold gold-text">R$ 0,00</div>
            </div>
        </div>
    </div>
</main>

<footer class="fixed bottom-0 left-0 right-0 p-4 bg-black/95 border-t border-[#222] z-50">
    <div class="max-w-xl mx-auto">
        <button onclick="finalizarPedido()" class="w-full gold-bg text-black py-5 rounded-2xl font-bold uppercase tracking-widest shadow-lg active:scale-95 transition">
            Finalizar via WhatsApp
        </button>
    </div>
</footer>

<script>
if (!firebase.apps.length) {
    firebase.initializeApp({
        apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
        databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
    });
}
const db = firebase.database();

let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
let pagamento = '';
let configEmpresa = { descontoPix: 5, parcelas: 3, fone: '' };
let resumoFinal = { bruto: 0, economiaPromo: 0, descPix: 0, totalFinal: 0 };

const fM = v => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

async function inicializar() {
    const snapEmp = await db.ref('settings/empresa').once('value');
    if(snapEmp.exists()){
        const d = snapEmp.val();
        configEmpresa.descontoPix = Number(d.descontoPix) || 0;
        configEmpresa.parcelas = Number(d.parcelas) || 3;
        configEmpresa.fone = d.whats || "";
    }
    
    document.getElementById('labelTxtPix').innerText = configEmpresa.descontoPix + "% OFF";
    document.getElementById('labelTxtCartao').innerText = `Até ${configEmpresa.parcelas}x s/ juros`;
    
    recalcular();
}

function setPagamento(p) {
    pagamento = p;
    document.getElementById('btnPix').className = p === 'Pix' ? 'pay-btn active' : 'pay-btn';
    document.getElementById('btnCartao').className = p === 'Cartão' ? 'pay-btn active' : 'pay-btn';
    recalcular();
}

async function recalcular() {
    let box = document.getElementById('listaItens');
    box.innerHTML = '';
    let bruto = 0, pesoTotal = 0, pecas = 0;

    // 1. Cálculos Básicos
    carrinho.forEach(item => {
        let q = parseInt(item.quantidade) || 1;
        let p = Number(item.precoFinal || item.price || 0);
        bruto += (p * q);
        pecas += q;
        pesoTotal += (Number(item.peso || item.weight || 0) * q);

        box.innerHTML += `
        <div class="flex items-center gap-3 py-3 border-b border-[#222]/50">
            <img src="${item.image}" class="w-10 h-10 object-cover rounded-md">
            <div class="flex-1">
                <h3 class="text-[9px] font-bold text-white uppercase">${item.name}</h3>
                <div class="text-[#caa85c] text-[10px]">${q}x de ${fM(p)}</div>
            </div>
            <div class="text-right font-bold text-white text-xs">${fM(p * q)}</div>
        </div>`;
    });

    // 2. Lógica de Atacado (Consulta do Banco)
    const promoSnap = await db.ref('settings/promocoesValor').once('value');
    const regras = promoSnap.val() || [];
    regras.sort((a, b) => a.min - b.min); // Ordem crescente para a barra

    let economiaPromo = 0;
    let regraAtiva = null;
    let proxima = null;

    regras.forEach(r => {
        if (bruto >= r.min) regraAtiva = r;
        else if (!proxima) proxima = r;
    });

    if (regras.length > 0) {
        document.getElementById('barraAtacado').classList.remove('hidden');
        const fill = document.getElementById('fillAtacado');
        const msg = document.getElementById('msgProximaFaixa');
        
        if (regraAtiva) {
            economiaPromo = bruto * (regraAtiva.desc / 100);
            document.getElementById('percAtual').innerText = `${regraAtiva.desc}% OFF`;
            document.getElementById('linhaDescontoPromo').classList.remove('hidden');
            document.getElementById('labelPromo').innerText = `Atacado (${regraAtiva.label})`;
            document.getElementById('valorDescontoPromo').innerText = `- ${fM(economiaPromo)}`;
        } else {
            document.getElementById('linhaDescontoPromo').classList.add('hidden');
            document.getElementById('percAtual').innerText = `0% OFF`;
        }

        if (proxima) {
            let falta = proxima.min - bruto;
            let percent = (bruto / proxima.min) * 100;
            fill.style.width = percent + "%";
            msg.innerText = `Faltam ${fM(falta)} para o desconto de ${proxima.desc}% (${proxima.label})`;
        } else {
            fill.style.width = "100%";
            msg.innerText = "Você atingiu o desconto máximo!";
        }
    }

    // 3. Cálculos de Pagamento
    let subComPromo = bruto - economiaPromo;
    let descPix = (pagamento === 'Pix') ? (subComPromo * (configEmpresa.descontoPix / 100)) : 0;
    let totalFinal = subComPromo - descPix;

    // 4. Atualizar UI
    document.getElementById('totalSkus').innerText = carrinho.length;
    document.getElementById('totalPecas').innerText = pecas;
    document.getElementById('pesoTotal').innerText = pesoTotal.toFixed(2) + "g";
    document.getElementById('subtotalTxt').innerText = fM(bruto);
    
    if (descPix > 0) {
        document.getElementById('linhaDescontoPix').classList.remove('hidden');
        document.getElementById('valorDescontoPix').innerText = `- ${fM(descPix)}`;
    } else {
        document.getElementById('linhaDescontoPix').classList.add('hidden');
    }

    document.getElementById('totalTxt').innerText = fM(totalFinal);

    // Salva para a função de finalizar
    resumoFinal = { bruto, economiaPromo, descPix, totalFinal };
}

async function finalizarPedido() {
    const nome = document.getElementById('nomeCliente').value;
    const fone = document.getElementById('telefoneCliente').value;
    
    if (!nome || !pagamento) return alert("Por favor, preencha seu nome e escolha o pagamento.");
    if (carrinho.length === 0) return alert("Seu carrinho está vazio.");

    const pedido = {
        cliente: { nome, telefone: fone },
        entrega: {
            nome: document.getElementById('nomeEntrega').value,
            rua: document.getElementById('rua').value,
            bairro: document.getElementById('bairro').value,
            cidade: document.getElementById('cidade').value
        },
        pagamento,
        itens: carrinho,
        subtotal: resumoFinal.bruto,
        descontoPromo: resumoFinal.economiaPromo,
        descontoPix: resumoFinal.descPix,
        total: resumoFinal.totalFinal,
        data: new Date().toLocaleString('pt-BR'),
        status: "Novo"
    };

    try {
        await db.ref('orders').push(pedido);
        let msgStr = `Olá! Sou *${nome}*.\nAcabei de fazer um pedido!\n\n*Total:* ${fM(resumoFinal.totalFinal)}\n*Pagamento:* ${pagamento}`;
        localStorage.removeItem('carrinho');
        window.location.href = `https://api.whatsapp.com/send?phone=${configEmpresa.fone}&text=${encodeURIComponent(msgStr)}`;
    } catch (e) {
        alert("Erro ao salvar pedido. Verifique sua conexão.");
    }
}

inicializar();
</script>
</body>
</html>
