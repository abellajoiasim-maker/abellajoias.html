<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Abella Joias • Catálogo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0b0b; color: #eee; margin:0; padding-bottom: 70px; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .gold-bg { background: #caa85c; }
        
        #bannerProgressoAtacado { background: #1a1a1a; border-bottom: 2px solid #caa85c; padding: 12px; text-align: center; position: sticky; top: 0; z-index: 60; display: none; }
        .barra-bg { background: #333; height: 6px; border-radius: 10px; margin-top: 8px; width: 100%; max-width: 300px; margin-left: auto; margin-right: auto; }
        #barraProgressoTopo { background: #caa85c; height: 100%; width: 0%; transition: 0.5s; }

        .product-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 20px; overflow: hidden; }
        .tag-atacado-flash { position: absolute; top: 10px; right: 10px; background: #caa85c; color: #000; font-size: 8px; font-weight: bold; padding: 2px 6px; border-radius: 4px; }
        .cart-count { position: absolute; top: -5px; right: -8px; background: #caa85c; color: #000; font-size: 9px; width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        #modalAdd { position: fixed; bottom: 0; left: 0; width: 100%; background: #141414; border-top: 2px solid #caa85c; z-index: 100; padding: 20px; transform: translateY(100%); transition: 0.4s; }
        #modalAdd.active { transform: translateY(0); }
    </style>
</head>
<body>

<div id="bannerProgressoAtacado">
    <div id="msgAtacadoTopo" class="text-[10px] uppercase font-bold tracking-widest">Aguardando...</div>
    <div class="barra-bg"><div id="barraProgressoTopo"></div></div>
</div>

<header class="p-6 text-center">
    <h1 class="serif gold-text text-2xl uppercase tracking-widest">Abella Joias</h1>
</header>

<div id="catContainer" class="flex overflow-x-auto gap-2 px-4 mb-4 no-scrollbar">
    <button onclick="filtrar('TUDO')" class="bg-white text-black px-4 py-1 rounded-full text-[10px] font-bold">TUDO</button>
</div>

<div id="listaProdutos" class="grid grid-cols-2 gap-4 px-4 pb-20"></div>

<div class="fixed bottom-0 w-full bg-black border-t border-[#222] flex justify-around py-3 z-50">
    <a href="#" class="gold-text text-[10px] flex flex-direction-column items-center"><span>Catálogo</span></a>
    <a href="carrinho.html" class="text-gray-500 text-[10px] relative">
        <div id="cartCount" class="cart-count">0</div>
        <span>Carrinho</span>
    </a>
</div>

<div id="modalAdd">
    <div id="infoProdAdd" class="flex gap-4 mb-4"></div>
    <div class="flex items-center justify-between bg-black p-3 rounded-lg">
        <span class="text-xs">Quantidade</span>
        <div class="flex items-center gap-4">
            <button onclick="mudarQtd(-1)" class="w-8 h-8 bg-[#222] rounded-full">-</button>
            <span id="qtdVal">1</span>
            <button onclick="mudarQtd(1)" class="w-8 h-8 bg-[#222] rounded-full">+</button>
        </div>
    </div>
    <button onclick="confirmarAdd()" class="w-full gold-bg text-black font-bold py-3 rounded-lg mt-4 text-xs uppercase">Adicionar</button>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allProducts = [], categories = {}, configEmpresa = {}, promoAtacado = null;
let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
let currentProd = null, qtd = 1;
const fM = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

window.onload = () => {
    db.ref('settings/general').on('value', s => configEmpresa = s.val() || {});
    db.ref('settings/promocoesValor').on('value', s => { promoAtacado = s.val(); atualizarBarraProgresso(); });
    db.ref('categories').once('value', s => { categories = s.val() || {}; renderCats(); });
    db.ref('products').on('value', s => {
        allProducts = [];
        s.forEach(c => { allProducts.push({ key: c.key, ...c.val() }); });
        filtrar('TUDO');
        atualizarCartIcon();
    });
};

function renderCats() {
    const cont = document.getElementById('catContainer');
    for(let k in categories) cont.innerHTML += `<button onclick="filtrar('${categories[k].name}')" class="bg-[#222] px-4 py-1 rounded-full text-[10px] uppercase">${categories[k].name}</button>`;
}

function filtrar(cat) {
    const list = document.getElementById('listaProdutos');
    list.innerHTML = '';
    const items = cat === 'TUDO' ? allProducts : allProducts.filter(p => p.category === cat);
    items.forEach(p => {
        list.innerHTML += `
            <div class="product-card p-3 relative" onclick="prepararAdd('${p.key}')">
                ${promoAtacado && promoAtacado.ativa ? '<div class="tag-atacado-flash">PROMO</div>' : ''}
                <img src="${p.image}" class="w-full aspect-square object-cover rounded-lg mb-2">
                <h3 class="text-[10px] font-bold uppercase truncate">${p.name}</h3>
                <p class="gold-text font-bold text-sm mt-1">${fM(p.price)}</p>
                <button class="w-full bg-[#222] py-2 rounded-lg mt-2 text-[8px] font-bold">COMPRAR</button>
            </div>`;
    });
}

function atualizarBarraProgresso() {
    const banner = document.getElementById('bannerProgressoAtacado');
    const msg = document.getElementById('msgAtacadoTopo');
    const barra = document.getElementById('barraProgressoTopo');
    if(!promoAtacado || !promoAtacado.ativa) return banner.style.display = 'none';

    banner.style.display = 'block';
    let total = carrinho.reduce((acc, i) => acc + (i.price * i.qnt), 0);
    let proxima = promoAtacado.regras ? promoAtacado.regras.find(r => total < r.min) : null;
    let atual = promoAtacado.regras ? [...promoAtacado.regras].reverse().find(r => total >= r.min) : null;

    if(proxima) {
        let falta = proxima.min - total;
        msg.innerHTML = `FALTAM <span class="gold-text">R$ ${falta.toFixed(2)}</span> PARA <span class="gold-text">${proxima.desc}% OFF</span>`;
        barra.style.width = (total / proxima.min * 100) + '%';
    } else if(atual) {
        msg.innerHTML = `✨ PARABÉNS! VOCÊ GANHOU <span class="gold-text">${atual.desc}% DE DESCONTO</span>`;
        barra.style.width = '100%';
    }
}

function prepararAdd(key) {
    currentProd = allProducts.find(p => p.key === key);
    qtd = 1;
    document.getElementById('qtdVal').innerText = qtd;
    document.getElementById('infoProdAdd').innerHTML = `<img src="${currentProd.image}" class="w-12 h-12 rounded"><div><p class="text-[10px] font-bold">${currentProd.name}</p><p class="gold-text text-xs">${fM(currentProd.price)}</p></div>`;
    document.getElementById('modalAdd').classList.add('active');
}

function mudarQtd(v) { qtd = Math.max(1, qtd + v); document.getElementById('qtdVal').innerText = qtd; }
function confirmarAdd() {
    const i = carrinho.findIndex(x => x.key === currentProd.key);
    if(i > -1) carrinho[i].qnt += qtd; else carrinho.push({...currentProd, qnt: qtd});
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    atualizarCartIcon(); atualizarBarraProgresso();
    document.getElementById('modalAdd').classList.remove('active');
}
function atualizarCartIcon() { document.getElementById('cartCount').innerText = carrinho.reduce((a, b) => a + b.qnt, 0); }
</script>
</body>
</html>
