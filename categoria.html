<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Abella Joias • Atacado de Luxo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0b0b; color: #eee; margin:0; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .gold-bg { background: #caa85c; }
        
        /* Header e Nav */
        header { background: rgba(0,0,0,0.95); border-bottom: 1px solid #222; backdrop-blur: 10px; }
        .btn-nav { border: 1px solid #333; color: #888; font-size: 10px; font-weight: bold; letter-spacing: 1px; transition: .3s; text-transform: uppercase; }
        .btn-nav:hover, .btn-nav.active { border-color: #caa85c; color: #caa85c; }

        /* Banner Relâmpago (Marketing Manager) */
        #bannerRelampago { background: linear-gradient(90deg, #1a1a1a, #000); border-bottom: 2px solid #caa85c; display: none; }

        /* Grid de Categorias */
        .card-cat { background:#141414; border-radius:24px; border:1px solid #2a2a2a; transition:.4s; overflow:hidden; position: relative; cursor: pointer; }
        .card-cat:hover { border-color: #caa85c; transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
        .img-cat { width:100%; aspect-ratio: 1/1.1; object-fit: cover; transition: 0.6s; }
        .card-cat:hover .img-cat { scale: 1.08; opacity: 0.7; }
        
        .cat-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; }

        /* Selos de Promoção */
        .promo-tag { position: absolute; top: 15px; right: 15px; font-size: 9px; font-weight: 900; padding: 4px 12px; border-radius: 50px; text-transform: uppercase; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #caa85c; border-radius: 10px; }
    </style>
</head>
<body class="custom-scroll">

<div id="bannerRelampago" class="py-3 px-4 text-center">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-center items-center gap-2 md:gap-6">
        <span id="textoRelampago" class="gold-text font-black uppercase text-[11px] tracking-widest italic"></span>
        <div id="countdown" class="font-mono text-white font-bold text-sm bg-black/40 px-4 py-1 rounded-full border border-white/10"></div>
    </div>
</div>

<header class="sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-center md:text-left">
            <h1 class="serif text-2xl gold-text tracking-[0.2em] uppercase leading-none" id="nomeLoja">Abella Joias</h1>
            <p class="text-[9px] tracking-[4px] text-gray-500 font-bold uppercase mt-1" id="sloganLoja">Carregando...</p>
        </div>
        
        <div class="flex gap-2 items-center">
            <a href="galvanicas.html" class="btn-nav px-5 py-2 rounded-xl">Galvânicas</a>
            <a href="carrinho.html" class="btn-nav px-5 py-2 rounded-xl flex items-center gap-2 bg-[#111] border-[#caa85c]/30">
                <span class="gold-text">🛒</span> 
                <span id="valorCarrinho" class="text-white">R$ 0,00</span>
            </a>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto p-6 md:p-12">
    <div class="mb-12">
        <h2 class="serif text-3xl text-white mb-2">Coleções</h2>
        <div class="h-1 w-20 gold-bg rounded-full"></div>
    </div>
    
    <div id="gridCategorias" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10">
        </div>
</main>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const fM = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

async function inicializarLoja() {
    // 1. Carregar Dados da Empresa e Marketing
    const [empSnap, promoSnap, catSnap] = await Promise.all([
        db.ref('settings/empresa').once('value'),
        db.ref('settings/promocao').once('value'),
        db.ref('categories').once('value')
    ]);

    const empresa = empSnap.val() || {};
    const promo = promoSnap.val() || {};
    const categorias = catSnap.val() || {};

    document.getElementById('nomeLoja').innerText = empresa.nome || "Abella Joias";
    document.getElementById('sloganLoja').innerText = empresa.slogan || "Atacado de Joias no Bruto";

    // 2. Lógica do Banner Relâmpago (Marketing Manager)
    if (promo.ativa && promo.relampago?.ativa) {
        const banner = document.getElementById('bannerRelampago');
        const countdownEl = document.getElementById('countdown');
        document.getElementById('textoRelampago').innerText = promo.relampago.titulo;
        banner.style.display = 'block';

        const dataFim = new Date(promo.relampago.fim).getTime();
        
        const timer = setInterval(() => {
            const agora = new Date().getTime();
            const dist = dataFim - agora;

            if (dist < 0) {
                clearInterval(timer);
                banner.style.display = 'none';
                return;
            }

            const h = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((dist % (1000 * 60)) / 1000);
            countdownEl.innerText = `${h}h ${m}m ${s}s`;
        }, 1000);
    }

    // 3. Renderizar Categorias com Selos de Promoção
    const grid = document.getElementById('gridCategorias');
    grid.innerHTML = '';

    Object.entries(categorias).forEach(([id, cat]) => {
        if (cat.paused) return;

        // Verifica se a categoria tem promoção ativa no Marketing Manager
        const temPromo = promo.ativa && cat.promoAtiva;

        grid.innerHTML += `
            <div class="card-cat" onclick="location.href='produtos.html?id=${id}'">
                ${temPromo ? `
                    <span class="promo-tag" style="background:${cat.promoColor || '#caa85c'}; color:${cat.promoTextColor || '#fff'}">
                        ${cat.promoTag || 'OFERTA'}
                    </span>
                ` : ''}
                <img src="${cat.image || 'https://via.placeholder.com/600x800'}" class="img-cat">
                <div class="cat-overlay">
                    <h3 class="serif text-xl text-white tracking-widest uppercase">${cat.name}</h3>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Ver Coleção Completa →</p>
                </div>
            </div>`;
    });

    atualizarResumoCarrinho();
}

function atualizarResumoCarrinho() {
    const carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    const total = carrinho.reduce((acc, item) => acc + (parseFloat(item.precoFinal || item.price) * item.quantidade), 0);
    document.getElementById('valorCarrinho').innerText = fM(total);
}

window.onload = inicializarLoja;
</script>
</body>
</html>
