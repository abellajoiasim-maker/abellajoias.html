<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pedidos • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="admin-style.css">

    <style>
        /* Ajuste fino para o editor de pedidos e scroll */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #caa85c; border-radius: 10px; }
        
        /* Garantia absoluta de limpeza na impressão */
        @media print {
            body { background: white !important; }
            header, nav, main, #editorPedido { display: none !important; }
            #print-area { display: block !important; position: absolute; top: 0; left: 0; width: 100%; color: black; }
        }
    </style>
</head>
<body class="bg-[#0b0b0b]">

    <header class="p-5 text-center text-xl font-bold bg-black border-b border-[#222] text-[#caa85c] uppercase">
        Abella Joias • Gestão de Pedidos
    </header>

    <nav class="flex flex-col md:flex-row gap-2 p-2 bg-[#111] sticky top-0 z-50">
        <div class="flex gap-2">
            <a href="estoque.html" class="btn">❮ Estoque</a>
            <button class="btn active" onclick="location.reload()">Pedidos Recebidos</button>
        </div>
        <input type="text" id="buscaPedido" placeholder="🔍 Buscar cliente..." class="md:ml-auto !mb-0 max-w-xs bg-[#1a1a1a] border border-[#333] p-2 rounded-lg text-white" oninput="carregarPedidos()">
    </nav>

    <main class="p-6 max-w-4xl mx-auto">
        <div id="listaPedidos" class="grid gap-4">
            <div class="text-center py-10 text-gray-600 italic">Carregando pedidos...</div>
        </div>
    </main>

    <div id="editorPedido" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
        <div class="bg-[#111] w-full max-w-5xl rounded-2xl p-5 overflow-auto max-h-[95vh] border border-[#333] custom-scroll">
            
            <div class="flex justify-between items-center mb-4 border-b border-[#222] pb-4">
                <h2 class="text-[#caa85c] font-bold uppercase tracking-tighter">Editar Pedido</h2>
                <div id="totalPreview" class="text-[#caa85c] font-bold text-2xl">R$ 0,00</div>
            </div>
            
            <div class="grid md:grid-cols-2 gap-4">
                <div class="card bg-black/40">
                    <p class="text-[10px] text-gray-500 mb-1 uppercase font-bold tracking-widest">Dados Pessoais</p>
                    <input id="edClienteNome" placeholder="Nome do Cliente" class="w-full bg-[#111] border border-[#333] p-2 rounded mb-2">
                    <input id="edClienteTel" placeholder="WhatsApp" class="w-full bg-[#111] border border-[#333] p-2 rounded">
                </div>
                <div class="card bg-black/40">
                    <p class="text-[10px] text-gray-500 mb-1 uppercase font-bold tracking-widest">Entrega / Logística</p>
                    <input id="edRua" placeholder="Endereço Completo" class="w-full bg-[#111] border border-[#333] p-2 rounded mb-2">
                    <input id="edCidade" placeholder="Cidade / Estado" class="w-full bg-[#111] border border-[#333] p-2 rounded">
                </div>
            </div>

            <div class="mt-6 flex justify-between items-center px-1">
                <h3 class="text-[#caa85c] font-bold text-sm uppercase italic">Itens do Pedido</h3>
                <button class="btn bg-green-900/30 text-green-500 border-green-900 hover:bg-green-900" onclick="addItemEditor()">+ ADICIONAR ITEM (SKU)</button>
            </div>

            <div id="edItens" class="mt-2 space-y-2"></div>

            <div class="card mt-4 grid grid-cols-2 md:grid-cols-4 gap-2 bg-[#1a1a1a]">
                <div><label class="text-[9px] text-gray-500 uppercase">Desc. Promo (R$)</label><input id="edDescPromo" type="number" oninput="recalcularTotalEd()" class="w-full bg-black border border-[#333] p-2 rounded"></div>
                <div><label class="text-[9px] text-gray-500 uppercase">Desc. Pix (R$)</label><input id="edDescPix" type="number" oninput="recalcularTotalEd()" class="w-full bg-black border border-[#333] p-2 rounded"></div>
                <div><label class="text-[9px] text-gray-500 uppercase">Frete (R$)</label><input id="edFrete" type="number" oninput="recalcularTotalEd()" class="w-full bg-black border border-[#333] p-2 rounded"></div>
                <div><label class="text-[9px] text-gray-500 uppercase">Total Peças</label><input id="edQtdTotal" type="number" readonly class="w-full bg-black/50 border border-[#333] p-2 rounded opacity-50 cursor-not-allowed"></div>
            </div>
            
            <div class="mt-6 p-4 border border-[#222] rounded-xl bg-black/20">
                <p class="text-[10px] text-gray-500 mb-2 uppercase font-bold text-center">Gerar Romaneio (Escolha o Modelo):</p>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2">
                    <button class="btn bg-blue-900 text-[9px] hover:bg-blue-700" onclick="imprimirRomaneio(pedidoEditando, 1)">1. CONFERÊNCIA</button>
                    <button class="btn bg-blue-900 text-[9px] hover:bg-blue-700" onclick="imprimirRomaneio(pedidoEditando, 2)">2. FINANCEIRO</button>
                    <button class="btn bg-blue-900 text-[9px] hover:bg-blue-700" onclick="imprimirRomaneio(pedidoEditando, 3)">3. VITRINE (FOTO)</button>
                    <button class="btn bg-indigo-900 text-[9px] hover:bg-indigo-700" onclick="imprimirRomaneio(pedidoEditando, 4)">4. GRADE CONF.</button>
                    <button class="btn bg-indigo-900 text-[9px] hover:bg-indigo-700" onclick="imprimirRomaneio(pedidoEditando, 5)">5. GRADE FIN.</button>
                    <button class="btn bg-indigo-900 text-[9px] hover:bg-indigo-700" onclick="imprimirRomaneio(pedidoEditando, 6)">6. GRADE TOTAL</button>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-2 pt-6 mt-4 border-t border-[#222]">
                <button class="btn-gold flex-grow py-3" onclick="salvarPedidoEditado()">SALVAR ALTERAÇÕES</button>
                <button class="btn bg-red-900/20 text-red-500 border-red-900 hover:bg-red-600 hover:text-white" onclick="excluirPedido(pedidoEditando)">EXCLUIR</button>
                <button class="btn py-3" onclick="fecharEditorPedido()">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="print-area"></div>

    <script>
        // Variável global que armazena qual ID de pedido estamos editando no momento
        var pedidoEditando = null;
    </script>
    <script src="admin-logic.js"></script>
    <script>window.onload = () => carregarPedidos();</script>
</body>
</html>
