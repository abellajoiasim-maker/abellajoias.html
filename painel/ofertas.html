<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Ofertas • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background:#0b0b0b; color:#eee; font-family:Inter,Arial; margin:0; }
        .card { background:#141414; border:1px solid #2a2a2a; border-radius:16px; padding:14px; }
        .btn-gold { background:#caa85c; color:#000; font-weight:700; padding:12px; border-radius:8px; cursor:pointer; }
        input { background:#111; border:1px solid #333; padding:8px; border-radius:8px; width:100%; color:#fff; outline:none; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #caa85c; border-radius: 10px; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-[#caa85c] font-bold text-2xl uppercase tracking-widest">Painel de Ofertas</h1>
            <p class="text-gray-500 text-xs mt-2 uppercase">Gestão Independente de Promoções</p>
        </header>

        <div class="card flex justify-between items-center bg-[#1a1a1a] mb-6 border-[#caa85c]/30">
            <div>
                <span class="text-sm font-bold block uppercase">Exibir Selos no Catálogo</span>
                <small class="text-[9px] text-gray-400 uppercase">Ativa ou desativa todas as ofertas visuais</small>
            </div>
            <button onclick="togglePromoStatus()" id="btnStatusPromo" class="px-8 py-3 rounded-xl text-[10px] font-black transition-all">
                CARREGANDO...
            </button>
        </div>

        <div id="listaCategoriasPromo" class="space-y-4 max-h-[60vh] overflow-y-auto custom-scroll pr-2">
            <p class="text-center text-gray-600">Carregando categorias...</p>
        </div>

        <div class="mt-8 flex gap-4">
            <button onclick="window.history.back()" class="flex-1 bg-gray-800 text-white font-bold py-4 rounded-xl uppercase text-xs">Voltar</button>
            <button onclick="salvarTodasOfertas()" class="flex-1 btn-gold py-4 rounded-xl uppercase text-xs shadow-lg shadow-[#caa85c]/20">Salvar Promoções</button>
        </div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY", databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let statusAtiva = false;

async function carregarOfertas() {
    const [snapPromo, snapCats] = await Promise.all([
        db.ref('settings/promocao').once('value'), 
        db.ref('categories').once('value')
    ]);
    
    statusAtiva = snapPromo.val()?.ativa || false;
    atualizarBotaoStatus();

    const box = document.getElementById('listaCategoriasPromo');
    box.innerHTML = '';

    snapCats.forEach(cat => {
        const c = cat.val();
        box.innerHTML += `
        <div class="card border border-[#222]">
            <div class="flex justify-between items-center mb-4">
                <span class="text-xs uppercase font-black text-[#caa85c]">${c.name}</span>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2">
                    <label class="text-[9px] text-gray-500 uppercase font-bold">Título da Campanha</label>
                    <input type="text" data-key="${cat.key}" class="p_name" value="${c.promoName || ''}" placeholder="Ex: Queima de Estoque">
                </div>
                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-bold">Texto do Selo</label>
                    <input type="text" data-key="${cat.key}" class="p_tag" value="${c.promoTag || 'OFERTA'}" placeholder="Ex: 20% OFF">
                </div>
                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-bold">Desconto (%)</label>
                    <input type="number" data-key="${cat.key}" class="p_pct" value="${c.promoPct || 0}">
                </div>
                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-bold block">Cor do Selo</label>
                    <input type="color" data-key="${cat.key}" class="p_color !h-10 !p-1" value="${c.promoColor || '#caa85c'}">
                </div>
                <div>
                    <label class="text-[9px] text-gray-500 uppercase font-bold block">Cor do Texto</label>
                    <input type="color" data-key="${cat.key}" class="p_tcolor !h-10 !p-1" value="${c.promoTextColor || '#ffffff'}">
                </div>
            </div>
        </div>`;
    });
}

function atualizarBotaoStatus() {
    const btn = document.getElementById('btnStatusPromo');
    btn.innerText = statusAtiva ? 'OFERTAS ATIVAS' : 'OFERTAS INATIVAS';
    btn.className = `px-8 py-3 rounded-xl text-[10px] font-black transition-all ${statusAtiva ? 'bg-green-600' : 'bg-red-600'}`;
}

function togglePromoStatus() {
    statusAtiva = !statusAtiva;
    atualizarBotaoStatus();
}

function salvarTodasOfertas() {
    const updates = {};
    updates['settings/promocao/ativa'] = statusAtiva;

    document.querySelectorAll('.p_pct').forEach(el => {
        const key = el.dataset.key;
        updates[`categories/${key}/promoPct`] = +el.value;
        updates[`categories/${key}/promoName`] = document.querySelector(`.p_name[data-key="${key}"]`).value;
        updates[`categories/${key}/promoTag`] = document.querySelector(`.p_tag[data-key="${key}"]`).value;
        updates[`categories/${key}/promoColor`] = document.querySelector(`.p_color[data-key="${key}"]`).value;
        updates[`categories/${key}/promoTextColor`] = document.querySelector(`.p_tcolor[data-key="${key}"]`).value;
    });

    db.ref().update(updates).then(() => alert("Ofertas salvas!")).catch(e => alert("Erro ao salvar"));
}

window.onload = carregarOfertas;
</script>
</body>
</html>
