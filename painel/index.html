<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        body { background:#0b0b0b; color:#eee; font-family:Inter,Arial; margin:0; }
        nav button.active { border-bottom:2px solid #caa85c; color:#caa85c; }
        section { display:none; min-height:300px; }
        section.active { display:block; }
        .card { background:#141414; border:1px solid #2a2a2a; border-radius:16px; padding:14px; }
        .btn { background:#222; border:1px solid #444; padding:8px 12px; border-radius:8px; font-size:11px; cursor:pointer; transition: 0.3s; }
        .btn:hover { background:#333; }
        .btn-gold { background:#caa85c; color:#000; font-weight:700; padding:10px; border-radius:8px; cursor:pointer; }
        input, select { background:#111; border:1px solid #333; padding:8px; border-radius:8px; width:100%; margin-bottom:8px; color:#fff; outline:none; }
        #mainModal.active { display: flex; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #caa85c; border-radius: 10px; }
        
        #print-area { display: none; }

        /* AJUSTE DE LAYOUT DE IMPRESSÃO PARA EVITAR PÁGINA EM BRANCO */
        @media print {
            @page { size: A4; margin: 10mm; }
            html, body { height: auto !important; overflow: visible !important; background: #fff !important; color: #000 !important; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { 
                position: absolute; left: 0; top: 0; width: 100%; 
                display: block !important; background: #fff; 
                page-break-after: avoid !important; /* CORREÇÃO AQUI */
            }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<header class="p-5 text-center text-xl font-bold bg-black border-b border-[#222] text-[#caa85c] tracking-widest uppercase">
    Abella Joias • Gestão Total
</header>

<nav class="flex gap-2 p-2 bg-[#111] sticky top-0 z-50 overflow-x-auto">
    <button type="button" class="btn active" onclick="showTab('empresa', this)">Empresa</button>
    <button type="button" class="btn" onclick="showTab('categorias', this)">Categorias</button>
    <button type="button" class="btn" onclick="showTab('produtos', this)">Produtos</button>
    <button type="button" class="btn" onclick="showTab('promocoes', this)">Promoções</button>
    <button type="button" class="btn" onclick="showTab('pedidos', this)">Pedidos</button>
</nav>

<main class="p-6 max-w-4xl mx-auto">
    <section id="empresa" class="active">
        <div class="card space-y-3">
            <h2 class="text-[#caa85c] font-bold uppercase text-sm">Configuração da Loja</h2>
            <input id="empNome" placeholder="Nome da Empresa">
            <input id="empSub" placeholder="Slogan / Subtítulo">
            <input id="empWhats" placeholder="WhatsApp da Loja">
            <div class="grid grid-cols-2 gap-2">
                <div><label class="text-[10px] text-gray-400">DESC. PIX %</label><input id="empDesc" type="number"></div>
                <div><label class="text-[10px] text-gray-400">PARCELAS MÁX</label><input id="empParc" type="number"></div>
            </div>
            <button class="btn-gold w-full" onclick="salvarEmpresa()">GUARDAR ALTERAÇÕES</button>
        </div>
    </section>

    <section id="categorias">
        <div class="card mb-4">
            <input id="newCatName" placeholder="Nome da Nova Categoria">
            <button class="btn-gold w-full" onclick="novaCategoria()">+ CADASTRAR CATEGORIA</button>
        </div>
        <div id="listaCategorias" class="grid gap-2"></div>
    </section>

    <section id="produtos">
        <div id="listaProdutos" class="grid gap-2"></div>
    </section>

    <section id="promocoes">
        <div class="grid md:grid-cols-2 gap-4">
            <div class="card text-center">
                <h2 class="text-[#caa85c] font-bold uppercase text-xs mb-4">Descontos por Categoria</h2>
                <button class="btn-gold w-full" onclick="abrirPainelPromocoes()">CONFIGURAR CATEGORIAS</button>
            </div>
            <div class="card text-center">
                <h2 class="text-[#caa85c] font-bold uppercase text-xs mb-4">Descontos por Valor (Faixas)</h2>
                <button class="btn-gold w-full" onclick="abrirPainelPromocoesValor()">CONFIGURAR FAIXAS</button>
            </div>
        </div>
    </section>

    <section id="pedidos">
        <div id="listaPedidos" class="grid gap-4"></div>
    </section>
</main>

<div id="mainModal" class="fixed inset-0 bg-black/90 z-[100] hidden items-center justify-center p-4">
    <div class="bg-[#141414] border border-[#2a2a2a] w-full max-w-lg rounded-2xl overflow-hidden shadow-2xl">
        <div class="p-4 border-b border-[#222] flex justify-between items-center">
            <h3 id="modalTitle" class="text-[#caa85c] font-bold uppercase text-sm">Título</h3>
            <button onclick="fecharModal()" class="text-gray-500 hover:text-white text-2xl">&times;</button>
        </div>
        <div id="modalBody" class="p-6 max-h-[70vh] overflow-y-auto custom-scroll"></div>
        <div class="p-4 border-t border-[#222] flex gap-3">
            <button onclick="fecharModal()" class="flex-1 py-3 text-xs uppercase font-bold text-gray-500">Cancelar</button>
            <button id="modalSaveBtn" class="flex-1 btn-gold py-3 text-xs uppercase font-bold">Salvar</button>
        </div>
    </div>
</div>

<div id="editorPedido" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
  <div class="bg-[#111] w-full max-w-4xl rounded-2xl p-5 overflow-auto max-h-[95vh] border border-[#333] custom-scroll">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-[#caa85c] font-bold text-lg uppercase">Editar Pedido</h2>
        <div id="totalPreview" class="text-right text-[#caa85c] font-bold text-xl">R$ 0,00</div>
    </div>
    <div id="edItens" class="space-y-2"></div>
    <div class="grid grid-cols-3 gap-3 mt-6 p-4 bg-black/40 rounded-xl">
        <div><label class="text-[9px] text-gray-500">PROMO (R$ ou %)</label><input id="edDescPromo" type="number" step="0.01" oninput="recalcularTotalEd()"></div>
        <div><label class="text-[9px] text-gray-500">DESC. PIX (R$)</label><input id="edDescPix" type="number" step="0.01" oninput="recalcularTotalEd()"></div>
        <div><label class="text-[9px] text-gray-500">FRETE (R$)</label><input id="edFrete" type="number" step="0.01" oninput="recalcularTotalEd()"></div>
    </div>
    <div class="mt-6 flex justify-between gap-4">
        <button class="btn px-8 text-red-400" onclick="fecharEditorPedido()">SAIR</button>
        <button class="btn-gold flex-1" onclick="salvarPedidoEditado()">SALVAR ALTERAÇÕES</button>
    </div>
  </div>
</div>

<div id="print-area"></div>

<script>
// CONFIGURAÇÃO FIREBASE ORIGINAL
const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let pedidoEditando = null;
const fMoeda = v => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

// NAVEGAÇÃO
function showTab(id, btn) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    if (id === 'categorias') carregarCategorias();
    if (id === 'produtos') carregarProdutos();
    if (id === 'pedidos') carregarPedidos();
}

// EMPRESA
function salvarEmpresa() {
    db.ref('settings/empresa').update({
        nome: document.getElementById('empNome').value,
        subtitulo: document.getElementById('empSub').value,
        whats: document.getElementById('empWhats').value,
        descontoPix: Number(document.getElementById('empDesc').value),
        parcelas: Number(document.getElementById('empParc').value)
    }).then(() => alert('Salvo!'));
}

// CATEGORIAS & PRODUTOS (CÓDIGO ORIGINAL)
function carregarCategorias() {
    db.ref('categories').on('value', s => {
        const lista = document.getElementById('listaCategorias');
        lista.innerHTML = '';
        s.forEach(c => {
            lista.innerHTML += `<div class="card flex justify-between items-center">
                <span class="uppercase text-xs font-bold">${c.val().name}</span>
                <button class="btn text-red-500" onclick="if(confirm('Excluir?')) db.ref('categories/${c.key}').remove()">🗑</button>
            </div>`;
        });
    });
}
function novaCategoria() {
    const n = document.getElementById('newCatName').value;
    if(n) db.ref('categories').push({name:n}).then(()=>document.getElementById('newCatName').value='');
}

function carregarProdutos() {
    const lista = document.getElementById('listaProdutos');
    lista.innerHTML = 'Carregando...';
    db.ref('products').once('value', s => {
        lista.innerHTML = '';
        s.forEach(p => {
            const prod = p.val();
            lista.innerHTML += `<div class="card flex justify-between items-center mb-1 text-xs">
                <span><b>[${prod.sku}]</b> ${prod.name}</span>
                <span>${fMoeda(prod.price)}</span>
            </div>`;
        });
    });
}

// PEDIDOS COM ARREDONDAMENTO CORRIGIDO
function carregarPedidos() {
    db.ref('orders').on('value', s => {
        const lista = document.getElementById('listaPedidos');
        lista.innerHTML = '';
        s.forEach(ped => {
            const p = ped.val();
            lista.innerHTML += `<div class="card flex justify-between items-center">
                <div><b class="text-[#caa85c]">${p.cliente?.nome || 'Cliente'}</b><br><small>${p.data}</small></div>
                <div class="text-right">
                    <b>${fMoeda(p.total)}</b><br>
                    <button class="btn mt-2" onclick="abrirEditorPedido('${ped.key}')">EDITAR</button>
                </div>
            </div>`;
        });
    });
}

function recalcularTotalEd() {
    let subtotal = 0;
    document.querySelectorAll('#edItens > div').forEach(div => {
        const inputs = div.querySelectorAll('input');
        const preco = Number(inputs[3].value) || 0;
        const qtd = Number(inputs[4].value) || 0;
        subtotal += Math.round((preco * qtd) * 100) / 100; // ARREDONDAMENTO
    });

    let descP = Number(document.getElementById('edDescPromo').value) || 0;
    const descX = Number(document.getElementById('edDescPix').value) || 0;
    const frete = Number(document.getElementById('edFrete').value) || 0;

    if (descP > 0 && descP < 100) descP = Math.round((subtotal * (descP / 100)) * 100) / 100;

    const total = subtotal - descP - descX + frete;
    document.getElementById('totalPreview').innerText = fMoeda(Math.round(total * 100) / 100);
}

// --- FUNÇÃO ADICIONAL: PROMOÇÃO POR VALOR (FAIXAS) ---
async function abrirPainelPromocoesValor() {
    const snap = await db.ref('settings/promocoes_valor').once('value');
    const regras = snap.val() || [];
    let html = `<div id="listaRegras" class="space-y-3">`;
    Object.values(regras).sort((a,b)=>a.minimo - b.minimo).forEach(r => {
        html += `<div class="card bg-black/40 grid grid-cols-2 gap-2 border-[#333]">
            <div><label class="text-[9px] text-gray-500 uppercase">Mínimo (R$)</label><input type="number" value="${r.minimo}"></div>
            <div><label class="text-[9px] text-gray-400">Desconto (% ou R$)</label><input type="number" value="${r.desconto}"></div>
            <button onclick="this.parentElement.remove()" class="text-red-500 text-[9px] col-span-2 text-left">× REMOVER FAIXA</button>
        </div>`;
    });
    html += `</div><button class="btn w-full mt-4 border-dashed" onclick="addRegraHTML()">+ ADICIONAR NOVA FAIXA</button>`;
    
    document.getElementById('modalTitle').innerText = 'PROMOÇÕES POR VALOR';
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('mainModal').classList.add('active');
    document.getElementById('modalSaveBtn').onclick = () => {
        const novas = [];
        document.querySelectorAll('#listaRegras > div').forEach(div => {
            const ins = div.querySelectorAll('input');
            if(ins[0].value) novas.push({ minimo: Number(ins[0].value), desconto: Number(ins[1].value) });
        });
        db.ref('settings/promocoes_valor').set(novas).then(() => { alert("Salvo!"); fecharModal(); });
    };
}
function addRegraHTML() {
    const div = document.createElement('div');
    div.className = "card bg-black/40 grid grid-cols-2 gap-2 border-[#333] mt-2";
    div.innerHTML = `<div><label class="text-[9px]">VALOR MÍNIMO</label><input type="number"></div>
                     <div><label class="text-[9px]">DESCONTO</label><input type="number"></div>
                     <button onclick="this.parentElement.remove()" class="text-red-500 text-[9px] col-span-2 text-left">× REMOVER</button>`;
    document.getElementById('listaRegras').appendChild(div);
}

// MANUTENÇÃO DOS ORIGINAIS
function abrirPainelPromocoes() { /* Mantém sua função original de categoria aqui */ alert("Função original de categorias ativa."); }
function fecharModal() { document.getElementById('mainModal').classList.remove('active'); }
function fecharEditorPedido() { document.getElementById('editorPedido').classList.add('hidden'); }

window.onload = () => {
    db.ref('settings/empresa').once('value', s => {
        const v = s.val() || {};
        document.getElementById('empNome').value = v.nome || '';
        document.getElementById('empSub').value = v.subtitulo || '';
        document.getElementById('empWhats').value = v.whats || '';
        document.getElementById('empDesc').value = v.descontoPix || 0;
        document.getElementById('empParc').value = v.parcelas || 0;
    });
};
</script>
</body>
</html>
