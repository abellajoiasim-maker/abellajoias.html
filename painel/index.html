<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        body { background:#0b0b0b; color:#eee; font-family:Inter,Arial; margin:0; }
        nav button.active { border-bottom:2px solid #caa85c; color:#caa85c; }
        section { display:none; min-height:300px; }
        section.active { display:block; }
        .card { background:#141414; border:1px solid #2a2a2a; border-radius:16px; padding:14px; }
        .btn { background:#222; border:1px solid #444; padding:8px 12px; border-radius:8px; font-size:11px; cursor:pointer; transition: 0.3s; }
        .btn:hover { background:#333; }
        .btn-gold { background:#caa85c; color:#000; font-weight:bold; }
        input, select, textarea { background:#000; border:1px solid #333; color:#fff; padding:8px; border-radius:8px; width:100%; font-size:12px; margin-bottom:10px; }
        
        #mainModal, #editorPedido { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; display:flex; align-items:center; justify-content:center; visibility:hidden; opacity:0; transition:0.3s; }
        #mainModal.active, #editorPedido:not(.hidden) { visibility:visible; opacity:1; }
        .modal-content { background:#141414; width:95%; max-width:600px; border-radius:20px; padding:20px; max-height:90vh; overflow-y:auto; border:1px solid #caa85c; }
        
        .status-badge { padding:2px 8px; border-radius:20px; font-size:10px; text-transform:uppercase; font-weight:bold; }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width:100%; } }
    </style>
</head>
<body>

<header class="p-4 border-b border-[#222] flex justify-between items-center">
    <h1 class="text-[#caa85c] font-bold text-lg italic">Abella Joias Admin</h1>
    <div id="userInfo" class="text-[10px] text-gray-400">Conectado ao Firebase</div>
</header>

<nav class="flex overflow-x-auto gap-4 px-4 bg-[#111] border-b border-[#222] no-scrollbar">
    <button onclick="tab('pedidos')" id="tab-pedidos" class="py-3 px-2 text-xs font-bold active uppercase">Pedidos</button>
    <button onclick="tab('produtos')" id="tab-produtos" class="py-3 px-2 text-xs font-bold uppercase">Produtos</button>
    <button onclick="tab('categorias')" id="tab-categorias" class="py-3 px-2 text-xs font-bold uppercase">Categorias</button>
    <button onclick="tab('config')" id="tab-config" class="py-3 px-2 text-xs font-bold uppercase">Configurações</button>
</nav>

<div class="p-4">
    <section id="pedidos" class="active">
        <input type="text" id="searchOrder" placeholder="Buscar pedido..." class="mb-4 h-10" onkeyup="renderPedidos()">
        <div id="listaPedidos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>

    <section id="produtos">
        <div class="flex justify-between mb-4">
            <h2 class="text-xs font-bold uppercase gold-text">Produtos</h2>
            <button onclick="abrirModalProduto()" class="btn btn-gold">Novo Produto</button>
        </div>
        <div id="listaProdutos" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
    </section>

    <section id="categorias">
        <div class="flex justify-between mb-4">
            <h2 class="text-xs font-bold uppercase gold-text">Categorias & Promoções</h2>
            <button onclick="abrirModalCategoria()" class="btn btn-gold">Nova Categoria</button>
        </div>
        <div id="listaCategorias" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </section>

    <section id="config">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card">
                <h3 class="text-xs font-bold mb-3 uppercase gold-text">Dados da Loja</h3>
                <label class="text-[10px]">Nome da Empresa</label>
                <input type="text" id="conf-nome">
                <label class="text-[10px]">WhatsApp (com DDD)</label>
                <input type="text" id="conf-whatsapp">
                <label class="text-[10px]">% Desconto no PIX</label>
                <input type="number" id="conf-pix">
                <button onclick="salvarConfigGeral()" class="btn btn-gold w-full">Salvar Dados</button>
            </div>
            <div class="card">
                <h3 class="text-xs font-bold mb-3 uppercase gold-text">Desconto Atacado (Por Valor)</h3>
                <div class="flex items-center gap-2 mb-4">
                    <input type="checkbox" id="statusPromoValor" style="width:20px;">
                    <label class="text-[11px]">Ativar Desconto por Valor Total</label>
                </div>
                <div id="containerFaixas"></div>
                <button onclick="addFaixa()" class="btn w-full mb-2">+ Adicionar Faixa</button>
                <button onclick="salvarPromoValor()" class="btn btn-gold w-full">Salvar Regras</button>
            </div>
        </div>
    </section>
</div>

<div id="mainModal">
    <div class="modal-content">
        <h2 id="modalTitle" class="text-sm font-bold gold-text uppercase mb-4">Produto</h2>
        <input type="hidden" id="prod-id">
        <div class="grid grid-cols-2 gap-2">
            <input type="text" id="prod-nome" placeholder="Nome">
            <input type="number" step="0.01" id="prod-preco" placeholder="Preço R$">
        </div>
        <div class="grid grid-cols-2 gap-2">
            <input type="text" id="prod-sku" placeholder="SKU">
            <input type="number" step="0.01" id="prod-peso" placeholder="Peso (g)">
        </div>
        <select id="prod-cat"></select>
        <input type="text" id="prod-img" placeholder="URL da Imagem">
        <textarea id="prod-desc" rows="3" placeholder="Descrição"></textarea>
        <div class="flex gap-2">
            <button onclick="fecharModal()" class="btn flex-1">Cancelar</button>
            <button onclick="salvarProduto()" class="btn btn-gold flex-1">Salvar</button>
        </div>
    </div>
</div>

<div id="print-area"></div>

<script>
// SUAS CREDENCIAIS CORRETAS
const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let orders = {}, products = {}, categories = {}, configEmpresa = {};
const fMoeda = v => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

window.onload = () => carregarDados();

function carregarDados() {
    db.ref('settings/general').on('value', s => {
        configEmpresa = s.val() || {};
        document.getElementById('conf-nome').value = configEmpresa.nome || '';
        document.getElementById('conf-whatsapp').value = configEmpresa.whatsapp || '';
        document.getElementById('conf-pix').value = configEmpresa.descontoPix || 0;
    });

    db.ref('orders').on('value', s => { orders = s.val() || {}; renderPedidos(); });
    db.ref('products').on('value', s => { products = s.val() || {}; renderProdutos(); });
    db.ref('categories').on('value', s => { 
        categories = s.val() || {}; 
        renderCategorias(); 
        atualizarSelectCategorias(); 
    });
    
    db.ref('settings/promocoesValor').on('value', s => {
        const p = s.val() || { ativa: false, regras: [] };
        document.getElementById('statusPromoValor').checked = p.ativa;
        document.getElementById('containerFaixas').innerHTML = '';
        if(p.regras) p.regras.forEach(r => addFaixa(r.min, r.desc));
    });
}

function tab(id) {
    document.querySelectorAll('section, nav button').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('tab-'+id).classList.add('active');
}

function renderPedidos() {
    const list = document.getElementById('listaPedidos');
    const search = document.getElementById('searchOrder').value.toLowerCase();
    list.innerHTML = '';
    Object.keys(orders).reverse().forEach(key => {
        const o = orders[key];
        if(o.cliente.nome.toLowerCase().includes(search)) {
            list.innerHTML += `
                <div class="card">
                    <div class="flex justify-between text-[10px] mb-2">
                        <span>#${key.slice(-5)}</span>
                        <span class="status-badge bg-blue-900">${o.status}</span>
                    </div>
                    <div class="text-xs font-bold uppercase">${o.cliente.nome}</div>
                    <div class="flex justify-between items-center mt-3">
                        <span class="gold-text font-bold">${fMoeda(o.total || 0)}</span>
                        <button onclick="excluirPedido('${key}')" class="text-red-500 text-xs">Excluir</button>
                    </div>
                </div>`;
        }
    });
}

function renderProdutos() {
    const list = document.getElementById('listaProdutos');
    list.innerHTML = '';
    for(let key in products) {
        const p = products[key];
        list.innerHTML += `
            <div class="card p-2 text-center">
                <img src="${p.image}" class="w-full h-20 object-cover rounded mb-2">
                <p class="text-[9px] font-bold truncate uppercase">${p.name}</p>
                <p class="text-[10px] gold-text font-bold">${fMoeda(p.price)}</p>
                <div class="flex gap-1 mt-2">
                    <button onclick="editarProduto('${key}')" class="btn flex-1 py-1">Editar</button>
                </div>
            </div>`;
    }
}

function renderCategorias() {
    const list = document.getElementById('listaCategorias');
    list.innerHTML = '';
    for(let key in categories) {
        const c = categories[key];
        list.innerHTML += `
            <div class="card">
                <h3 class="text-xs font-bold gold-text">${c.name}</h3>
                <div class="mt-2 text-[10px]">Desconto Categoria: ${c.promoPct || 0}%</div>
                <input type="number" value="${c.promoPct || 0}" class="h-8 mt-1" onchange="atualizarPromoCat('${key}', this.value)">
                <button onclick="excluirCategoria('${key}')" class="text-red-500 text-[10px] mt-2 block">Excluir</button>
            </div>`;
    }
}

function addFaixa(min = '', desc = '') {
    const div = document.createElement('div');
    div.className = "faixa-item bg-[#222] p-2 rounded mb-2 flex gap-2";
    div.innerHTML = `
        <input type="number" class="val-min h-8" value="${min}" placeholder="A partir de R$">
        <input type="number" class="val-pct h-8" value="${desc}" placeholder="% Desc">
        <button onclick="this.parentElement.remove()" class="text-red-500">×</button>
    `;
    document.getElementById('containerFaixas').appendChild(div);
}

function salvarPromoValor() {
    const faixas = [];
    document.querySelectorAll('.faixa-item').forEach(item => {
        const min = parseFloat(item.querySelector('.val-min').value);
        const desc = parseFloat(item.querySelector('.val-pct').value);
        if(!isNaN(min)) faixas.push({ min, desc });
    });
    db.ref('settings/promocoesValor').set({
        ativa: document.getElementById('statusPromoValor').checked,
        regras: faixas.sort((a,b) => a.min - b.min)
    }).then(() => alert("Regras salvas!"));
}

function atualizarPromoCat(key, val) { db.ref('categories/'+key).update({ promoPct: parseFloat(val) || 0 }); }
function abrirModalCategoria() { const n = prompt("Nome:"); if(n) db.ref('categories').push({ name: n, promoPct: 0 }); }
function excluirCategoria(key) { if(confirm("Excluir?")) db.ref('categories/'+key).remove(); }
function abrirModalProduto() { document.getElementById('prod-id').value=''; document.getElementById('mainModal').classList.add('active'); }
function editarProduto(key) {
    const p = products[key];
    document.getElementById('prod-id').value = key;
    document.getElementById('prod-nome').value = p.name;
    document.getElementById('prod-preco').value = p.price;
    document.getElementById('prod-sku').value = p.sku || '';
    document.getElementById('prod-peso').value = p.peso || 0;
    document.getElementById('prod-cat').value = p.category || '';
    document.getElementById('prod-img').value = p.image || '';
    document.getElementById('prod-desc').value = p.description || '';
    document.getElementById('mainModal').classList.add('active');
}
function salvarProduto() {
    const id = document.getElementById('prod-id').value;
    const p = {
        name: document.getElementById('prod-nome').value,
        price: parseFloat(document.getElementById('prod-preco').value),
        sku: document.getElementById('prod-sku').value,
        peso: parseFloat(document.getElementById('prod-peso').value) || 0,
        category: document.getElementById('prod-cat').value,
        image: document.getElementById('prod-img').value,
        description: document.getElementById('prod-desc').value
    };
    if(id) db.ref('products/'+id).update(p); else db.ref('products').push(p);
    fecharModal();
}
function fecharModal() { document.getElementById('mainModal').classList.remove('active'); }
function excluirPedido(id) { if(confirm("Excluir?")) db.ref('orders/'+id).remove(); }
function atualizarSelectCategorias() {
    const sel = document.getElementById('prod-cat');
    sel.innerHTML = '<option value="">Sem Categoria</option>';
    for(let key in categories) sel.innerHTML += `<option value="${categories[key].name}">${categories[key].name}</option>`;
}
function salvarConfigGeral() {
    db.ref('settings/general').update({
        nome: document.getElementById('conf-nome').value,
        whatsapp: document.getElementById('conf-whatsapp').value,
        descontoPix: parseFloat(document.getElementById('conf-pix').value) || 0
    }).then(() => alert("Salvo!"));
}
</script>
</body>
</html>
