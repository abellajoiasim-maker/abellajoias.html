<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        body { background:#0b0b0b; color:#eee; font-family:Inter,Arial; margin:0; }
        nav button.active { border-bottom:2px solid #caa85c; color:#caa85c; }
        section { display:none; min-height:300px; }
        section.active { display:block; }
        .card { background:#141414; border:1px solid #2a2a2a; border-radius:16px; padding:14px; }
        .btn { background:#222; border:1px solid #444; padding:8px 12px; border-radius:8px; font-size:11px; cursor:pointer; transition: 0.3s; }
        .btn:hover { background:#333; }
        .btn-gold { background:#caa85c; color:#000; font-weight:bold; }
        input, select, textarea { background:#1a1a1a; border:1px solid #333; padding:10px; border-radius:10px; color:#fff; width:100%; outline:none; font-size:12px; }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        
        /* Estilo para impressão de Romaneios */
        @media print {
            body * { visibility: hidden; }
            #areaImpressao, #areaImpressao * { visibility: visible; }
            #areaImpressao { position: absolute; left: 0; top: 0; width: 100%; color: #000; background: #fff; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <nav class="flex justify-around bg-black border-b border-[#222] sticky top-0 z-50 overflow-x-auto">
        <button onclick="tab('pedidos')" class="p-4 text-[10px] font-bold uppercase active" id="btn-pedidos">Pedidos</button>
        <button onclick="tab('produtos')" class="p-4 text-[10px] font-bold uppercase" id="btn-produtos">Produtos</button>
        <button onclick="location.href='ofertas.html'" class="p-4 text-[10px] font-bold uppercase text-[#caa85c]">Marketing ⚡</button>
        <button onclick="tab('empresa')" class="p-4 text-[10px] font-bold uppercase" id="btn-empresa">Empresa</button>
    </nav>

    <section id="pedidos" class="p-4 active">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-[#caa85c] font-bold uppercase tracking-tighter">Gestão de Vendas</h2>
            <button onclick="limparPedidosAntigos()" class="text-[9px] text-red-500 uppercase">Limpar Histórico</button>
        </div>
        <div id="lista-pedidos" class="space-y-3"></div>
    </section>

    <section id="produtos" class="p-4">
        <div class="flex gap-2 mb-4">
            <button onclick="abrirModalProduto()" class="flex-1 btn-gold p-3 rounded-xl text-[10px] uppercase">Novo Produto</button>
            <button onclick="location.href='categoria.html'" class="flex-1 btn p-3 rounded-xl text-[10px] uppercase">Categorias</button>
        </div>
        <input type="text" id="buscaProduto" oninput="filtrarProdutos()" placeholder="Buscar produto por nome..." class="mb-4">
        <div id="lista-produtos" class="grid grid-cols-1 gap-2"></div>
    </section>

    <section id="empresa" class="p-4">
        <div class="card space-y-4">
            <h3 class="gold-text font-bold uppercase text-xs">Dados da Empresa</h3>
            <input type="text" id="conf-nome" placeholder="Nome da Marca">
            <input type="text" id="conf-whatsapp" placeholder="WhatsApp (Ex: 5519...)">
            <textarea id="conf-msg" placeholder="Mensagem padrão de boas-vindas" rows="3"></textarea>
            <button onclick="salvarConfigEmpresa()" class="btn-gold w-full p-3 rounded-xl uppercase text-[10px]">Atualizar Dados</button>
        </div>
    </section>

    <div id="modalPedido" class="fixed inset-0 bg-black/95 z-[60] hidden overflow-y-auto p-4">
        <div class="max-w-3xl mx-auto bg-[#141414] border border-[#333] rounded-3xl p-6 shadow-2xl">
            <div id="areaImpressao">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="gold-text font-bold uppercase text-lg" id="det-nome-cliente">Cliente</h3>
                        <p class="text-xs text-gray-500" id="det-data"></p>
                    </div>
                    <button onclick="fecharPedido()" class="no-print text-gray-500 text-xl">✕</button>
                </div>

                <div id="det-corpo" class="text-xs space-y-4">
                    </div>
            </div>

            <div class="flex gap-2 mt-8 no-print">
                <button onclick="window.print()" class="flex-1 bg-white text-black p-3 rounded-xl font-bold uppercase text-[9px]">Imprimir Romaneio</button>
                <button id="btn-whatsapp-status" class="flex-1 bg-green-600 p-3 rounded-xl font-bold uppercase text-[9px]">Avisar no Whats</button>
            </div>
        </div>
    </div>

<script>
// Configuração Centralizada
const firebaseConfig = { apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY", databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function tab(name) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    document.getElementById('btn-'+name).classList.add('active');
}

// --- LÓGICA DE PEDIDOS ---
db.ref('orders').on('value', snap => {
    const list = document.getElementById('lista-pedidos');
    list.innerHTML = '';
    snap.forEach(child => {
        const p = child.val();
        list.innerHTML += `
            <div class="card flex justify-between items-center border-l-4 ${p.status === 'Enviado' ? 'border-green-500' : 'border-[#caa85c]'}" onclick="verPedido('${child.key}')">
                <div>
                    <p class="font-bold uppercase text-[11px]">${p.cliente.nome}</p>
                    <p class="text-[9px] text-gray-500">${p.data} • ${p.itens.length} itens</p>
                </div>
                <div class="text-right">
                    <p class="gold-text font-bold text-sm">R$ ${p.total.toFixed(2)}</p>
                    <span class="status-badge ${p.status === 'Enviado' ? 'bg-green-900/20 text-green-500' : 'bg-blue-900/20 text-blue-400'}">${p.status || 'Novo'}</span>
                </div>
            </div>`;
    });
});

async function verPedido(id) {
    const snap = await db.ref('orders/'+id).once('value');
    const p = snap.val();
    document.getElementById('det-nome-cliente').innerText = p.cliente.nome;
    document.getElementById('det-data').innerText = `Pedido ID: ${id} • Data: ${p.data}`;
    
    let itensHtml = '';
    p.itens.forEach(i => {
        itensHtml += `
        <div class="flex justify-between border-b border-[#222] py-2">
            <span>${i.quantidade}x ${i.name}</span>
            <span class="font-bold">R$ ${(i.price * i.quantidade).toFixed(2)}</span>
        </div>`;
    });

    document.getElementById('det-corpo').innerHTML = `
        <div class="grid grid-cols-2 gap-4 bg-black/40 p-4 rounded-xl border border-[#222]">
            <div><p class="text-gray-500 uppercase text-[8px]">WhatsApp</p><p>${p.cliente.telefone || 'Não informado'}</p></div>
            <div><p class="text-gray-500 uppercase text-[8px]">Cidade</p><p>${p.entrega?.cidade || 'Retirada'}</p></div>
        </div>

        <div class="space-y-1">
            <p class="text-[#caa85c] font-black uppercase text-[9px] mb-1">Itens do Romaneio</p>
            ${itensHtml}
        </div>

        <div class="bg-[#1a1a1a] p-4 rounded-xl space-y-2 border border-[#333]">
            <div class="flex justify-between"><span>Subtotal</span><span>R$ ${p.subtotal.toFixed(2)}</span></div>
            <div class="flex justify-between text-green-500 italic"><span>Desconto Progressivo</span><span>- R$ ${(p.descontoPromo || 0).toFixed(2)}</span></div>
            <div class="flex justify-between text-lg font-black gold-text"><span>Total Líquido</span><span>R$ ${p.total.toFixed(2)}</span></div>
        </div>
    `;
    
    document.getElementById('modalPedido').classList.remove('hidden');
}

function fecharPedido() { document.getElementById('modalPedido').classList.add('hidden'); }

// --- LÓGICA DE PRODUTOS ---
function filtrarProdutos() {
    const termo = document.getElementById('buscaProduto').value.toLowerCase();
    db.ref('products').once('value', snap => {
        const list = document.getElementById('lista-produtos');
        list.innerHTML = '';
        snap.forEach(child => {
            const p = child.val();
            if (p.name.toLowerCase().includes(termo)) {
                list.innerHTML += `
                <div class="card flex items-center gap-4">
                    <img src="${p.image}" class="w-12 h-12 object-cover rounded-lg">
                    <div class="flex-1">
                        <p class="text-[10px] font-bold uppercase truncate">${p.name}</p>
                        <p class="gold-text text-[10px]">R$ ${p.price.toFixed(2)}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editarProduto('${child.key}')" class="btn text-blue-400">✏️</button>
                        <button onclick="excluirProduto('${child.key}')" class="btn text-red-500">🗑️</button>
                    </div>
                </div>`;
            }
        });
    });
}

// Inicialização
window.onload = () => {
    tab('pedidos');
    filtrarProdutos();
    
    // Carregar configurações de empresa se existirem
    db.ref('settings/empresa').once('value', snap => {
        const c = snap.val();
        if(c) {
            document.getElementById('conf-nome').value = c.nome || '';
            document.getElementById('conf-whatsapp').value = c.whatsapp || '';
            document.getElementById('conf-msg').value = c.mensagem || '';
        }
    });
};

function salvarConfigEmpresa() {
    const dados = {
        nome: document.getElementById('conf-nome').value,
        whatsapp: document.getElementById('conf-whatsapp').value,
        mensagem: document.getElementById('conf-msg').value
    };
    db.ref('settings/empresa').set(dados).then(() => alert("Dados da empresa atualizados!"));
}

</script>
</body>
</html>
