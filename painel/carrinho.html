<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Carrinho • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0b0b; color: #eee; margin:0; padding-bottom: 120px; }
        .gold-text { color: #caa85c; }
        .card { background: #141414; border-radius: 20px; border: 1px solid #222; padding: 16px; }
        input { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; border-radius: 12px !important; padding: 12px !important; width: 100%; }
        .barra-bg { background: #222; height: 6px; border-radius: 10px; overflow: hidden; }
        .barra-fill { background: #caa85c; height: 100%; transition: 0.5s ease-out; }
    </style>
</head>
<body class="p-4">

    <header class="flex items-center gap-4 mb-8">
        <button onclick="window.history.back()" class="p-2 bg-[#141414] rounded-full">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <h1 class="serif gold-text text-xl uppercase tracking-widest">Carrinho</h1>
    </header>

    <div id="progresso-container" class="hidden card mb-6 border-[#caa85c]/30">
        <div class="flex justify-between items-end mb-2">
            <div>
                <p id="progresso-msg" class="text-[10px] text-gray-400 uppercase font-bold">Adicione mais itens</p>
                <p id="progresso-meta" class="text-xs font-black uppercase gold-text">Para ganhar 10% OFF</p>
            </div>
            <span id="progresso-pct" class="text-[10px] font-bold">0%</span>
        </div>
        <div class="barra-bg">
            <div id="progresso-barra" class="barra-fill" style="width: 0%"></div>
        </div>
    </div>

    <div id="lista-carrinho" class="space-y-3 mb-8">
        </div>

    <div class="card space-y-4">
        <h3 class="gold-text serif text-sm uppercase">Dados para Entrega</h3>
        <input type="text" id="nomeCliente" placeholder="Seu Nome Completo">
        <input type="text" id="telefoneCliente" placeholder="WhatsApp">
        <input type="text" id="cidade" placeholder="Cidade / Estado">
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-lg border-t border-[#222] p-4 z-50">
        <div class="max-w-xl mx-auto space-y-2 mb-4">
            <div class="flex justify-between text-xs text-gray-400"><span>Subtotal:</span> <span id="res-sub">R$ 0,00</span></div>
            <div class="flex justify-between text-xs text-green-500"><span>Desconto:</span> <span id="res-desc">- R$ 0,00</span></div>
            <div class="flex justify-between text-lg font-black gold-text italic"><span>Total:</span> <span id="res-total">R$ 0,00</span></div>
        </div>
        <button onclick="enviarPedido()" class="w-full bg-[#caa85c] text-black py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-[#caa85c]/20">Finalizar no WhatsApp</button>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY", databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
let resumoFinal = { sub: 0, desc: 0, total: 0 };

async function render() {
    const box = document.getElementById('lista-carrinho');
    box.innerHTML = '';
    let subtotal = 0;

    carrinho.forEach((item, index) => {
        subtotal += item.price * item.quantidade;
        box.innerHTML += `
            <div class="flex items-center gap-4 bg-[#141414] p-3 rounded-2xl border border-[#222]">
                <img src="${item.image}" class="w-16 h-16 object-cover rounded-xl">
                <div class="flex-1">
                    <p class="text-[10px] font-bold uppercase truncate w-40">${item.name}</p>
                    <p class="gold-text text-xs font-bold">R$ ${item.price.toFixed(2)}</p>
                    <div class="flex items-center gap-3 mt-2">
                        <button onclick="altQtd(${index}, -1)" class="w-6 h-6 bg-black rounded border border-[#333]">-</button>
                        <span class="text-xs font-bold">${item.quantidade}</span>
                        <button onclick="altQtd(${index}, 1)" class="w-6 h-6 bg-black rounded border border-[#333]">+</button>
                    </div>
                </div>
                <button onclick="remover(${index})" class="text-gray-600">✕</button>
            </div>`;
    });

    if(carrinho.length === 0) box.innerHTML = '<p class="text-center py-10 text-gray-600">Seu carrinho está vazio.</p>';

    // Lógica de Promoções e Barra
    const snapPromo = await db.ref('settings/promocao').once('value');
    const promo = snapPromo.val() || {};
    let pctDesc = 0;

    if (promo.ativa && promo.regras_progressivas) {
        const regras = Object.values(promo.regras_progressivas);
        const container = document.getElementById('progresso-container');
        let proximaMeta = null;

        regras.forEach(r => {
            if (r.ativa) {
                if (subtotal >= r.min) pctDesc = r.desc;
                else if (!proximaMeta) proximaMeta = r;
            }
        });

        if (subtotal > 0 && (proximaMeta || pctDesc > 0)) {
            container.classList.remove('hidden');
            if (proximaMeta) {
                const faltante = proximaMeta.min - subtotal;
                const perc = (subtotal / proximaMeta.min) * 100;
                document.getElementById('progresso-barra').style.width = perc + "%";
                document.getElementById('progresso-msg').innerText = `Faltam R$ ${faltante.toFixed(2)}`;
                document.getElementById('progresso-meta').innerText = `Para ganhar ${proximaMeta.desc}% OFF`;
                document.getElementById('progresso-pct').innerText = Math.floor(perc) + "%";
            } else {
                document.getElementById('progresso-barra').style.width = "100%";
                document.getElementById('progresso-msg').innerText = "Parabéns!";
                document.getElementById('progresso-meta').innerText = "Desconto máximo aplicado!";
            }
        }
    }

    resumoFinal.sub = subtotal;
    resumoFinal.desc = (subtotal * pctDesc) / 100;
    resumoFinal.total = subtotal - resumoFinal.desc;

    document.getElementById('res-sub').innerText = "R$ " + resumoFinal.sub.toFixed(2);
    document.getElementById('res-desc').innerText = "- R$ " + resumoFinal.desc.toFixed(2);
    document.getElementById('res-total').innerText = "R$ " + resumoFinal.total.toFixed(2);
}

function altQtd(idx, delta) {
    carrinho[idx].quantidade += delta;
    if (carrinho[idx].quantidade <= 0) carrinho.splice(idx, 1);
    salvar();
}

function remover(idx) { carrinho.splice(idx, 1); salvar(); }
function salvar() { localStorage.setItem('carrinho', JSON.stringify(carrinho)); render(); }

async function enviarPedido() {
    const nome = document.getElementById('nomeCliente').value;
    if (!nome || carrinho.length === 0) return alert("Preencha seu nome e adicione itens.");

    const pedido = {
        cliente: { nome, tel: document.getElementById('telefoneCliente').value, cidade: document.getElementById('cidade').value },
        itens: carrinho,
        resumo: resumoFinal,
        data: new Date().toISOString()
    };

    await db.ref('orders').push(pedido);
    
    let msg = `*NOVO PEDIDO - ABELLA JOIAS*\\n\\n`;
    msg += `*Cliente:* ${nome}\\n*Cidade:* ${pedido.cliente.cidade}\\n\\n`;
    carrinho.forEach(i => { msg += `• ${i.quantidade}x ${i.name} (R$ ${i.price})\\n`; });
    msg += `\\n*Subtotal:* R$ ${resumoFinal.sub.toFixed(2)}`;
    msg += `\\n*Desconto:* R$ ${resumoFinal.desc.toFixed(2)}`;
    msg += `\\n*TOTAL:* R$ ${resumoFinal.total.toFixed(2)}`;

    localStorage.removeItem('carrinho');
    window.location.href = `https://api.whatsapp.com/send?phone=5519988207658&text=${encodeURIComponent(msg)}`;
}

render();
</script>
</body>
</html>
