<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Pedido • Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0b0b; color: #eee; margin:0; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .gold-bg { background: #caa85c; }
        .card { background: #141414; border-radius: 18px; border: 1px solid #2a2a2a; padding: 20px; margin-bottom: 20px; }
        input { background: #000 !important; border: 1px solid #333 !important; color: #fff !important; padding: 12px; border-radius: 10px; width: 100%; outline: none; margin-bottom: 12px; font-size: 14px; }
        .pay-btn { border: 1px solid #333; border-radius: 14px; padding: 16px; text-align: center; cursor: pointer; transition: 0.3s; }
        .pay-btn.active { border-color: #caa85c; background: rgba(202, 168, 92, 0.05); }
        .price-anchor-highlight { text-decoration: line-through; color: #ff4d4d; font-size: 1.5rem; font-weight: bold; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body>

<header class="sticky top-0 z-50 bg-black/95 backdrop-blur-md border-b border-[#222]">
    <div class="max-w-xl mx-auto p-4 flex justify-between items-center">
        <button onclick="history.back()" class="text-[10px] font-bold uppercase gold-text">← Voltar</button>
        <h1 class="serif gold-text uppercase text-sm tracking-widest">Finalizar Pedido</h1>
    </div>
</header>

<main class="max-w-xl mx-auto p-4 pb-40">
    <div class="card">
        <h2 class="serif gold-text uppercase text-[10px] mb-4 tracking-widest opacity-70 text-center">Itens no Carrinho</h2>
        <div id="listaItens" class="space-y-4"></div>

        <div class="grid grid-cols-3 gap-2 mt-6 pt-6 border-t border-[#222]">
            <div class="bg-black p-3 rounded-xl border border-[#222] text-center">
                <span class="block text-[8px] uppercase text-gray-500 font-bold mb-1">Modelos</span>
                <b id="totalSkus" class="text-white">0</b>
            </div>
            <div class="bg-black p-3 rounded-xl border border-[#222] text-center">
                <span class="block text-[8px] uppercase text-gray-500 font-bold mb-1">Peças</span>
                <b id="totalPecas" class="text-white">0</b>
            </div>
            <div class="bg-black p-3 rounded-xl border border-[#caa85c]/20 text-center">
                <span class="block text-[8px] uppercase gold-text font-bold mb-1">Peso Total</span>
                <b id="pesoTotal" class="text-white text-xs">0,00g</b>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 class="serif gold-text uppercase text-[10px] mb-4 tracking-widest border-b border-[#222] pb-2">Identificação</h2>
        <input id="nomeCliente" placeholder="Seu Nome Completo *">
        <input id="telefoneCliente" placeholder="WhatsApp (DDD + Número) *">
    </div>

    <div class="card">
        <h2 class="serif gold-text uppercase text-[10px] mb-4 tracking-widest border-b border-[#222] pb-2">Local de Entrega</h2>
        <input id="nomeEntrega" placeholder="Nome do Destinatário">
        <input id="rua" placeholder="Rua / Avenida">
        <div class="grid grid-cols-4 gap-2">
            <input id="num" placeholder="Nº">
            <input id="bairro" placeholder="Bairro" class="col-span-3">
        </div>
        <input id="cidade" placeholder="Cidade">
        <input id="cepEntrega" placeholder="CEP">
    </div>

    <div class="card">
        <h2 class="serif gold-text uppercase text-[10px] mb-4 tracking-widest border-b border-[#222] pb-2">Forma de Pagamento</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="pay-btn" onclick="setPagamento('Pix', this)">
                <span class="block text-white font-bold">PIX</span>
                <span id="labelTxtPix" class="text-[10px] text-green-500 font-bold uppercase">Com Desconto</span>
            </div>
            <div class="pay-btn" onclick="setPagamento('Cartão', this)">
                <span class="block text-white font-bold">CARTÃO</span>
                <span id="labelTxtCartao" class="text-[10px] text-blue-400 font-bold uppercase">Até 3x s/ Acréscimo</span>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 class="serif gold-text uppercase text-[10px] mb-6 tracking-widest text-center border-b border-[#222] pb-2">Resumo Financeiro</h2>
        <div class="space-y-4">
            <div class="flex justify-between text-gray-500 text-sm">
                <span>Subtotal Bruto</span>
                <b id="subtotalTxt" class="text-white">R$ 0,00</b>
            </div>
            <div id="containerDescontos" class="space-y-3 pt-3 border-t border-dashed border-[#333]">
                <div id="linhaDescontoPromo" class="flex justify-between text-emerald-500 italic text-sm hidden">
                    <span id="labelPromo">Desconto Progressivo</span>
                    <b id="valorDescontoPromo">- R$ 0,00</b>
                </div>
                <div id="linhaCondicao" class="flex justify-between text-blue-300 italic text-sm hidden">
                    <span id="labelCondicao">Condição Selecionada</span>
                    <b id="valorCondicao">R$ 0,00</b>
                </div>
            </div>
            <div class="mt-6 pt-6 border-t-2 border-[#caa85c] flex flex-col items-end">
                <div id="totalTxt" class="text-3xl font-bold gold-text">R$ 0,00</div>
            </div>
        </div>
    </div>
</main>

<footer class="fixed bottom-0 left-0 right-0 p-4 bg-black/90 border-t border-[#222] z-50">
    <div class="max-w-xl mx-auto">
        <button onclick="finalizarPedido()" class="w-full gold-bg text-black py-5 rounded-2xl font-bold uppercase tracking-widest active:scale-95 transition shadow-lg">
            Finalizar via WhatsApp
        </button>
    </div>
</footer>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
    databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
let pagamento = '';
let configEmpresa = { descontoPix: 5, parcelas: 3, fone: '5511999999999' };

const fM = v => Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

async function inicializar() {
    // Carrega dados da empresa
    const snapEmp = await db.ref('settings/empresa').once('value');
    if(snapEmp.exists()){
        const d = snapEmp.val();
        configEmpresa.descontoPix = Number(d.descontoPix) || 0;
        configEmpresa.parcelas = Number(d.parcelas) || 3;
        configEmpresa.fone = d.whats || configEmpresa.fone;
    }
    
    document.getElementById('labelTxtPix').innerText = configEmpresa.descontoPix > 0 ? `${configEmpresa.descontoPix}% de Desconto` : 'Pagamento à vista';
    document.getElementById('labelTxtCartao').innerText = `Até ${configEmpresa.parcelas}x sem juros`;
    
    carregarCarrinho();
}

function setPagamento(p, el) {
    pagamento = p;
    document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
    carregarCarrinho();
}

async function carregarCarrinho() {
    let box = document.getElementById('listaItens');
    box.innerHTML = '';
    let bruto = 0, pesoTotal = 0, pecas = 0;

    carrinho.forEach((item, index) => {
        let q = parseInt(item.quantidade) || 1;
        let p = Number(item.price || item.precoFinal || 0);
        bruto += Math.round((p * q) * 100) / 100;
        pecas += q;
        pesoTotal += (Number(item.peso || item.weight || 0) * q);

        box.innerHTML += `
        <div class="flex items-center gap-3 py-4 border-b border-[#222]">
            <img src="${item.image}" class="w-14 h-14 object-cover rounded-lg border border-[#333]">
            <div class="flex-1">
                <h3 class="text-[10px] font-bold text-white uppercase">${item.name}</h3>
                <div class="text-[#caa85c] text-xs font-bold mt-1">${q}x ${fM(p)}</div>
            </div>
            <div class="text-right font-bold text-white text-sm">${fM(p * q)}</div>
        </div>`;
    });

    // BUSCA REGRAS DE DESCONTO POR VALOR
    const snapRegras = await db.ref('settings/promocoes_valor').once('value');
    const regras = snapRegras.val() || [];
    let economiaPromo = 0;

    // Regras devem estar ordenadas do maior valor mínimo para o menor
    const regrasOrdenadas = Object.values(regras).sort((a, b) => b.minimo - a.minimo);
    
    for (let r of regrasOrdenadas) {
        if (bruto >= r.minimo) {
            if (r.desconto < 100) {
                // Se o valor for menor que 100, aplica %
                economiaPromo = Math.round((bruto * (r.desconto / 100)) * 100) / 100;
            } else {
                // Se for maior ou igual a 100, aplica valor fixo R$
                economiaPromo = r.desconto;
            }
            break; 
        }
    }

    const subtotalAposPromo = Math.round((bruto - economiaPromo) * 100) / 100;
    const descPix = (pagamento === 'Pix') ? Math.round((subtotalAposPromo * (configEmpresa.descontoPix / 100)) * 100) / 100 : 0;
    const totalFinal = Math.round((subtotalAposPromo - descPix) * 100) / 100;

    // Interface
    document.getElementById('totalSkus').innerText = carrinho.length;
    document.getElementById('totalPecas').innerText = pecas;
    document.getElementById('pesoTotal').innerText = pesoTotal.toFixed(2) + "g";
    document.getElementById('subtotalTxt').innerText = fM(bruto);

    if (economiaPromo > 0) {
        document.getElementById('linhaDescontoPromo').classList.remove('hidden');
        document.getElementById('valorDescontoPromo').innerText = "- " + fM(economiaPromo);
    } else {
        document.getElementById('linhaDescontoPromo').classList.add('hidden');
    }

    if (descPix > 0) {
        document.getElementById('linhaCondicao').classList.remove('hidden');
        document.getElementById('labelCondicao').innerText = "Desconto Pix";
        document.getElementById('valorCondicao').innerText = "- " + fM(descPix);
    } else if (pagamento === 'Cartão') {
        document.getElementById('linhaCondicao').classList.remove('hidden');
        document.getElementById('labelCondicao').innerText = `${configEmpresa.parcelas}x no Cartão`;
        document.getElementById('valorCondicao').innerText = `${fM(totalFinal / configEmpresa.parcelas)} p/ mês`;
    } else {
        document.getElementById('linhaCondicao').classList.add('hidden');
    }

    document.getElementById('totalTxt').innerText = fM(totalFinal);

    window.resumoFinal = { bruto, economiaPromo, descPix, totalFinal, pecas, pesoTotal };
}

async function finalizarPedido() {
    const nome = document.getElementById('nomeCliente').value;
    const fone = document.getElementById('telefoneCliente').value;
    if (!nome || !pagamento) return alert("Por favor, preencha seu nome e escolha a forma de pagamento.");

    const pedido = {
        cliente: { nome, telefone: fone },
        entrega: {
            nomeEntrega: document.getElementById('nomeEntrega').value,
            rua: document.getElementById('rua').value,
            bairro: document.getElementById('bairro').value,
            cidade: document.getElementById('cidade').value
        },
        pagamento,
        itens: carrinho,
        subtotal: window.resumoFinal.bruto,
        descontoPromo: window.resumoFinal.economiaPromo,
        descontoPix: window.resumoFinal.descPix,
        total: window.resumoFinal.totalFinal,
        data: new Date().toLocaleString('pt-BR'),
        status: "Novo"
    };

    try {
        await db.ref('orders').push(pedido);
        let msg = `Olá! Sou *${nome}*.\nFiz um pedido na Abella Joias!\n\n*Total:* ${fM(window.resumoFinal.totalFinal)}\n*Pagamento:* ${pagamento}`;
        localStorage.removeItem('carrinho');
        window.location.href = `https://api.whatsapp.com/send?phone=${configEmpresa.fone}&text=${encodeURIComponent(msg)}`;
    } catch (e) {
        alert("Erro ao enviar pedido.");
    }
}

inicializar();
</script>
</body>
</html>
