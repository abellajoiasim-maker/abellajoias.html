<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Produtos | Abella Joias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b0b0b; color: #eee; margin:0; padding-bottom: 60px; }
        .serif { font-family: 'Cinzel', serif; }
        .gold-text { color: #caa85c; }
        .gold-bg { background: #caa85c; }
        .card { background: #141414; border-radius: 18px; border: 1px solid #2a2a2a; transition: 0.3s; position: relative; overflow: hidden; }
        .badge-promo { position: absolute; top: 10px; left: 10px; z-index: 10; padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #modalQtd { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        #modalQtd.active { display: flex; }
    </style>
</head>
<body>

    <header class="p-4 sticky top-0 z-40 bg-black/80 backdrop-blur-md border-b border-[#222]">
        <div class="flex justify-between items-center max-w-5xl mx-auto">
            <h1 class="serif gold-text text-xl tracking-widest">ABELLA JOIAS</h1>
            <a href="carrinho.html" class="relative">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span id="cart-count" class="absolute -top-2 -right-2 gold-bg text-black text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
            </a>
        </div>
    </header>

    <main class="p-4 max-w-5xl mx-auto">
        <div id="banner-relampago" class="hidden mb-6 p-4 rounded-2xl bg-gradient-to-r from-red-900 to-black border border-red-500/30 text-center">
            <p id="relampago-txt" class="text-[10px] uppercase font-black text-red-500 mb-1"></p>
            <div id="countdown" class="serif text-xl gold-text font-bold">00:00:00</div>
        </div>

        <div id="product-list" class="grid grid-cols-2 md:grid-cols-3 gap-4">
            </div>
    </main>

    <div id="modalQtd">
        <div class="bg-[#141414] w-full max-w-sm rounded-3xl p-6 border border-[#333]">
            <h2 id="modalTitle" class="serif gold-text text-lg mb-4 uppercase"></h2>
            <div id="variacoesContainer" class="space-y-4 mb-6 max-h-60 overflow-y-auto pr-2"></div>
            <div class="flex gap-3">
                <button onclick="fecharModal()" class="flex-1 py-3 text-xs uppercase font-bold text-gray-500">Cancelar</button>
                <button id="btnConfirmarAdd" class="flex-[2] gold-bg text-black py-3 rounded-xl text-xs uppercase font-black">Adicionar</button>
            </div>
        </div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY", databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let categoriasCache = {};
let produtoAtualParaAdd = null;

async function iniciar() {
    // 1. Carrega Categorias e Configurações de Promoção
    const [snapCats, snapPromo] = await Promise.all([
        db.ref('categories').once('value'),
        db.ref('settings/promocao').once('value')
    ]);
    
    snapCats.forEach(c => { categoriasCache[c.key] = c.val(); });
    const promoGlobal = snapPromo.val() || {};

    // 2. Carrega Produtos
    db.ref('products').on('value', snap => {
        const list = document.getElementById('product-list');
        list.innerHTML = '';
        
        snap.forEach(child => {
            const p = child.val();
            const cat = categoriasCache[p.category] || {};
            
            // Lógica de Selos
            let selo = '';
            if (promoGlobal.ativa) {
                if (p.promoAtiva && p.promoPct > 0) {
                    selo = `<div class="badge-promo" style="background:#ff0000; color:#fff">SALDÃO -${p.promoPct}%</div>`;
                } else if (cat.promoAtiva) {
                    selo = `<div class="badge-promo" style="background:${cat.promoColor}; color:${cat.promoTextColor}">${cat.promoTag} -${cat.promoPct}%</div>`;
                }
            }

            list.innerHTML += `
                <div class="card" onclick="abrirModal('${child.key}', ${JSON.stringify(p).replace(/"/g, '&quot;')})">
                    ${selo}
                    <img src="${p.image}" class="w-full h-44 object-cover">
                    <div class="p-3">
                        <h3 class="text-[10px] font-medium text-gray-400 uppercase truncate">${p.name}</h3>
                        <p class="gold-text font-bold">R$ ${p.price.toFixed(2)}</p>
                    </div>
                </div>`;
        });
    });

    atualizarContador();
}

function abrirModal(key, p) {
    produtoAtualParaAdd = { ...p, id: key };
    document.getElementById('modalTitle').innerText = p.name;
    const container = document.getElementById('variacoesContainer');
    container.innerHTML = '';

    if (p.variations) {
        p.variations.split(',').forEach(v => {
            container.innerHTML += `
                <div class="flex items-center justify-between bg-black/40 p-3 rounded-xl border border-[#222]">
                    <span class="text-xs uppercase font-bold">${v.trim()}</span>
                    <input type="number" class="input-var w-16 bg-black text-center gold-text border border-[#333] rounded-lg p-1" data-var="${v.trim()}" value="0" min="0">
                </div>`;
        });
    } else {
        container.innerHTML = `
            <div class="flex items-center justify-between bg-black/40 p-3 rounded-xl border border-[#222]">
                <span class="text-xs uppercase font-bold">Quantidade</span>
                <input type="number" id="qtdSimples" class="w-16 bg-black text-center gold-text border border-[#333] rounded-lg p-1" value="1" min="1">
            </div>`;
    }
    document.getElementById('modalQtd').classList.add('active');
}

document.getElementById('btnConfirmarAdd').onclick = () => {
    let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    const inputs = document.querySelectorAll('.input-var');
    
    if (inputs.length > 0) {
        inputs.forEach(i => {
            if (parseInt(i.value) > 0) {
                carrinho.push({ ...produtoAtualParaAdd, name: `${produtoAtualParaAdd.name} (${i.dataset.var})`, quantidade: parseInt(i.value) });
            }
        });
    } else {
        const q = parseInt(document.getElementById('qtdSimples').value);
        if (q > 0) carrinho.push({ ...produtoAtualParaAdd, quantidade: q });
    }

    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    fecharModal();
    atualizarContador();
};

function fecharModal() { document.getElementById('modalQtd').classList.remove('active'); }
function atualizarContador() {
    const c = JSON.parse(localStorage.getItem('carrinho') || '[]');
    document.getElementById('cart-count').innerText = c.length;
}

iniciar();
</script>
</body>
</html>
